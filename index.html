<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MyMoji Book</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --c-lavender: #d3c3fc;
    --c-sky: #9ac5fc;
    --c-mint: #b8f0d8;
    --c-peach: #fbc8d4;
    --c-white: #ffffff;
    --c-bg: #f4f0ff;
    --c-text: #2d2640;
    --c-text-sub: #7a7090;
    --c-border: #e0d8f8;
    --c-card: rgba(255,255,255,0.82);
    --radius: 20px;
    --radius-sm: 12px;
    --nav-h: 64px;
    --header-h: 56px;
    --max-w: 600px;
    --col: 1;
  }

  /* iPad Pro: 2カラムレイアウト */
  @media (min-width: 768px) {
    :root {
      --max-w: 1024px;
      --col: 2;
      --nav-h: 72px;
      --header-h: 64px;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Zen Maru Gothic', 'Meiryo UI', sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  #app {
    width: 100%;
    max-width: var(--max-w);
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    background: var(--c-bg);
  }

  /* ── Fluid background blobs ── */
  .fluid-bg {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: var(--max-w);
    height: 100vh;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(48px);
    opacity: 0.45;
    animation: blobFloat 12s ease-in-out infinite alternate;
  }
  .blob-1 { width: 260px; height: 260px; background: var(--c-lavender); top: -60px; left: -40px; animation-delay: 0s; }
  .blob-2 { width: 200px; height: 200px; background: var(--c-sky); top: 100px; right: -30px; animation-delay: 3s; }
  .blob-3 { width: 180px; height: 180px; background: var(--c-peach); top: 50%; left: 20px; animation-delay: 6s; }
  .blob-4 { width: 220px; height: 220px; background: var(--c-mint); bottom: 80px; right: -20px; animation-delay: 2s; }
  @keyframes blobFloat {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(12px, 16px) scale(1.08); }
  }

  /* ── Screens ── */
  .screen {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding-bottom: calc(var(--nav-h) + 16px);
  }
  .screen.active { display: block; }
  #screen-login { padding-bottom: 0; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  #screen-login.active { display: flex; }

  /* ── Header ── */
  .app-header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(244,240,255,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .app-header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
    background: linear-gradient(135deg, #9b7fe8, #5aaae8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-btn {
    background: none; border: none; cursor: pointer;
    color: var(--c-text-sub); font-size: 22px; padding: 4px;
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: var(--max-w);
    height: var(--nav-h);
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--c-border);
    display: flex;
    z-index: 100;
  }
  @media (min-width: 768px) {
    .nav-btn { font-size: 12px; gap: 6px; }
    .nav-btn .icon svg { width: 28px; height: 28px; }
  }
  .nav-btn {
    flex: 1; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; color: var(--c-text-sub); font-size: 10px; font-weight: 500;
    transition: color 0.2s;
  }
  .nav-btn .icon { font-size: 24px; }
  .nav-btn.active { color: #9b7fe8; }

  /* ── Login ── */
  .login-logo {
    font-size: 26px; font-weight: 800; letter-spacing: 0.02em;
    background: linear-gradient(135deg, #9b7fe8, #5aaae8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 6px;
  }
  .login-sub { color: var(--c-text-sub); font-size: 13px; margin-bottom: 40px; }
  .login-card {
    background: var(--c-card);
    border-radius: var(--radius);
    padding: 32px 28px;
    width: calc(100% - 48px);
    max-width: 440px;
    box-shadow: 0 8px 40px rgba(155,127,232,0.12);
    border: 1px solid var(--c-border);
  }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 12px; color: var(--c-text-sub); margin-bottom: 6px; font-weight: 500; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--c-border);
    border-radius: var(--radius-sm);
    font-size: 15px; color: var(--c-text);
    background: rgba(255,255,255,0.9);
    outline: none; transition: border-color 0.2s;
    font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--c-lavender);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #b8a0f0, #7ab8f5);
    border: none; border-radius: 50px;
    color: white; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em;
    transition: opacity 0.2s, transform 0.1s;
    font-family: inherit;
  }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

  .btn-secondary {
    background: none; border: 1.5px solid var(--c-border);
    border-radius: 50px; color: var(--c-text-sub);
    font-size: 13px; cursor: pointer;
    margin-top: 12px; display: block; text-align: center;
    width: 100%; padding: 10px;
    font-family: inherit;
    transition: background 0.2s;
  }
  .btn-secondary:active { background: var(--c-border); }

  .error-msg { color: #e05c7a; font-size: 13px; margin-top: 10px; text-align: center; }

  /* ── Cards / List ── */
  .section-pad { padding: 16px 20px; }

  .font-list { display: grid; grid-template-columns: repeat(var(--col), 1fr); gap: 10px; padding: 0 16px 16px; }

  .font-card {
    background: var(--c-card);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 16px rgba(155,127,232,0.08);
    border: 1px solid var(--c-border);
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  }
  .font-card:active { transform: scale(0.98); box-shadow: 0 1px 8px rgba(155,127,232,0.1); }

  .font-thumb {
    width: 52px; height: 52px; border-radius: 14px;
    object-fit: cover; background: var(--c-border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--c-text-sub);
    overflow: hidden;
  }
  .font-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .font-info { flex: 1; min-width: 0; }
  .font-name { font-size: 16px; font-weight: 700; }
  .font-maker { font-size: 12px; color: var(--c-text-sub); margin-top: 2px; }
  .font-cat-badge {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 20px; margin-top: 5px; font-weight: 600;
    background: linear-gradient(135deg, var(--c-lavender), var(--c-sky));
    color: #5a4a8a;
  }

  .fav-btn {
    background: none; border: none; cursor: pointer; font-size: 22px;
    color: var(--c-border); transition: color 0.2s; flex-shrink: 0;
  }
  .fav-btn.active { color: #e06090; }

  /* ── Search bar ── */
  .search-wrap {
    padding: 10px 16px 6px;
    display: flex; gap: 8px; align-items: center;
  }
  .search-box {
    flex: 1; min-width: 0; display: flex; align-items: center;
    background: var(--c-card); border: 1.5px solid var(--c-border);
    border-radius: 50px; padding: 8px 14px; gap: 8px;
  }
  .search-icon { color: var(--c-text-sub); display: flex; align-items: center; flex-shrink: 0; }
  .search-box input {
    border: none; background: none; outline: none;
    font-size: 14px; color: var(--c-text); flex: 1; min-width: 0;
    font-family: inherit;
  }
  .sort-btn {
    background: var(--c-card); border: 1.5px solid var(--c-border);
    border-radius: 50px; padding: 8px 12px;
    font-size: 12px; color: var(--c-text-sub);
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    display: flex; align-items: center; gap: 4px;
    font-family: inherit;
  }

  /* ── Carousel ── */
  .carousel-wrap {
    padding: 16px 16px 8px;
  }
  .carousel {
    display: flex; gap: 10px; overflow-x: auto;
    scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
    padding-bottom: 8px; scrollbar-width: none;
  }
  .carousel::-webkit-scrollbar { display: none; }
  .carousel-item {
    flex-shrink: 0; width: 200px; height: 130px;
    border-radius: var(--radius); overflow: hidden;
    scroll-snap-align: start; cursor: pointer;
    background: var(--c-border);
    position: relative;
  }
  @media (min-width: 768px) {
    .carousel-item { width: 280px; height: 180px; }
  }
  .carousel-item img { width: 100%; height: 100%; object-fit: cover; }
  .carousel-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(45,38,64,0.7));
    color: white; font-size: 12px; font-weight: 600;
    padding: 8px 12px;
  }
  .carousel-empty {
    width: 100%; height: 100px;
    background: var(--c-card); border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    color: var(--c-text-sub); font-size: 13px;
    border: 1.5px dashed var(--c-border);
  }

  /* ── Section label ── */
  .sec-label {
    font-size: 12px; font-weight: 700; color: var(--c-text-sub);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 16px 4px;
  }

  /* ── Detail page ── */
  .detail-hero {
    width: 100%; height: 220px;
    background: var(--c-border); overflow: hidden; position: relative;
  }
  @media (min-width: 768px) {
    .detail-hero { height: 320px; }
    .detail-body { padding: 28px 32px; }
    .photos-grid { grid-template-columns: repeat(5, 1fr); }
    .usage-grid { grid-template-columns: repeat(3, 1fr); }
    .form-page { max-width: 600px; margin: 0 auto; }
  }
  .detail-hero img { width: 100%; height: 100%; object-fit: cover; }
  .detail-body { padding: 20px; }
  .detail-title { font-size: 22px; font-weight: 800; }
  .detail-reading { font-size: 13px; color: var(--c-text-sub); margin-top: 2px; }
  .detail-maker { font-size: 14px; color: var(--c-text-sub); margin-top: 4px; }
  .chip {
    display: inline-block; font-size: 11px; padding: 4px 12px;
    border-radius: 20px; font-weight: 700;
    background: linear-gradient(135deg, var(--c-lavender), var(--c-sky));
    color: #5a4a8a; margin-top: 10px;
  }
  .detail-section { margin-top: 22px; }
  .detail-section h3 { font-size: 13px; font-weight: 700; color: var(--c-text-sub); margin-bottom: 10px; letter-spacing: 0.05em; }
  .memo-text { font-size: 14px; line-height: 1.7; color: var(--c-text); }
  .divider { height: 1px; background: var(--c-border); margin: 20px 0; }

  /* photos grid */
  .photos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .photo-thumb {
    aspect-ratio: 1; border-radius: 10px; overflow: hidden;
    background: var(--c-border); cursor: pointer;
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }

  /* usage cards */
  .usage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .usage-card {
    background: var(--c-card); border-radius: var(--radius-sm);
    overflow: hidden; cursor: pointer;
    border: 1px solid var(--c-border);
  }
  .usage-card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: var(--c-border); }
  .usage-card-info { padding: 8px 10px; }
  .usage-card-date { font-size: 10px; color: var(--c-text-sub); }
  .usage-card-place { font-size: 12px; font-weight: 600; margin-top: 2px; }

  /* ── Photo upload ── */
  .photo-upload-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .photo-slot {
    width: 70px; height: 70px; border-radius: 12px;
    border: 2px dashed var(--c-border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden; position: relative;
    background: rgba(255,255,255,0.6);
  }
  .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
  .photo-slot .add-icon { font-size: 24px; color: var(--c-text-sub); }
  .photo-slot .remove-btn {
    position: absolute; top: 2px; right: 2px;
    background: rgba(0,0,0,0.4); color: white;
    border: none; border-radius: 50%; width: 18px; height: 18px;
    font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }

  /* ── Form page ── */
  .form-page { padding: 16px 20px; }
  .form-page h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }

  .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .radio-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; cursor: pointer;
  }
  .radio-label input { accent-color: #9b7fe8; }

  /* ── Lightbox ── */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  #lightbox.active { display: flex; }
  #lightbox img { max-width: 94vw; max-height: 80vh; border-radius: 12px; object-fit: contain; }
  #lightbox-memo { color: white; font-size: 13px; margin-top: 14px; max-width: 80vw; text-align: center; }
  #lightbox-close {
    position: absolute; top: 20px; right: 20px;
    color: white; font-size: 28px; background: none; border: none; cursor: pointer;
  }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(45,38,64,0.88); color: white;
    padding: 10px 24px; border-radius: 50px;
    font-size: 13px; z-index: 300; opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Loading ── */
  #loading {
    position: fixed; inset: 0; z-index: 400;
    background: var(--c-bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .loading-logo {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #9b7fe8, #5aaae8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--c-border);
    border-top-color: #9b7fe8; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Back button ── */
  .back-btn { background: none; border: none; cursor: pointer; color: var(--c-text); padding: 4px; display: flex; align-items: center; }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--c-text-sub); font-size: 14px; line-height: 2;
  }
  .empty-state .empty-icon { display: block; margin: 0 auto 16px; opacity: 0.4; }
</style>
</head>
<body>

<div id="app">

  <!-- Fluid background -->
  <div class="fluid-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="loading-logo">MyMoji Book</div>
    <div class="spinner"></div>
  </div>

  <!-- ===== LOGIN ===== -->
  <div id="screen-login" class="screen">
    <div class="login-logo">MyMoji Book</div>
    <div class="login-sub">私だけのフォント辞書</div>
    <div class="login-card">
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="login-email" placeholder="mail@example.com">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" id="login-btn">ログイン</button>
      <div class="error-msg" id="login-error"></div>
    </div>
  </div>

  <!-- ===== HOME ===== -->
  <div id="screen-home" class="screen">
    <div class="app-header">
      <h1>MyMoji Book</h1>
      <button class="header-btn" id="logout-btn" title="ログアウト"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>

    <!-- Carousel -->
    <div class="carousel-wrap">
      <div class="sec-label">最近登録したフォント</div>
      <div class="carousel" id="home-carousel"></div>
    </div>

    <!-- Search + Sort -->
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span>
        <input type="text" id="search-input" placeholder="フォント名・メーカー・メモで検索">
      </div>
      <button class="sort-btn" id="sort-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M7 12h10M11 18h2"/></svg> <span id="sort-label">新しい順</span></button>
    </div>

    <!-- Font list -->
    <div class="font-list" id="font-list"></div>
  </div>

  <!-- ===== FONT DETAIL ===== -->
  <div id="screen-detail" class="screen">
    <div class="app-header">
      <button class="back-btn" id="detail-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <h1>フォント詳細</h1>
      <button class="fav-btn" id="detail-fav">♡</button>
    </div>
    <div id="detail-content"></div>
  </div>

  <!-- ===== USAGE DETAIL ===== -->
  <div id="screen-usage-detail" class="screen">
    <div class="app-header">
      <button class="back-btn" id="usage-detail-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <h1>用例詳細</h1>
      <div></div>
    </div>
    <div id="usage-detail-content"></div>
  </div>

  <!-- ===== ADD FONT ===== -->
  <div id="screen-add-font" class="screen">
    <div class="app-header">
      <button class="back-btn" id="add-font-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <h1>フォントを登録</h1>
      <div></div>
    </div>
    <div class="form-page">
      <div class="form-group">
        <label>フォント名 *</label>
        <input type="text" id="af-name" placeholder="例：源ノ角ゴシック">
      </div>
      <div class="form-group">
        <label>読み方</label>
        <input type="text" id="af-reading" placeholder="例：げんのかくごしっく">
      </div>
      <div class="form-group">
        <label>メーカー名</label>
        <input type="text" id="af-maker" placeholder="例：Adobe">
      </div>
      <div class="form-group">
        <label>カテゴリー</label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="af-cat" value="ゴシック" checked> ゴシック</label>
          <label class="radio-label"><input type="radio" name="af-cat" value="明朝"> 明朝</label>
          <label class="radio-label"><input type="radio" name="af-cat" value="セリフ"> セリフ</label>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL }
  from "https://www.gstatic.com/firebasejs/11.9.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfkg6_1F9E2OCF6dqFG7fWSc79htIKsX8",
  authDomain: "mymojibook-dd86e.firebaseapp.com",
  projectId: "mymojibook-dd86e",
  storageBucket: "mymojibook-dd86e.firebasestorage.app",
  messagingSenderId: "696369772307",
  appId: "1:696369772307:web:6f0309153ed2180c364ce6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// ── State ──────────────────────────────────
let fonts = [];
let currentFontId = null;
let currentUsageId = null;
let selectedUsageFontId = null;
let sortMode = 'new'; // 'new' | 'fav'
let searchQuery = '';

// photo slots state
let afPhotoFiles = [null,null,null,null,null];
let afPhotoMemos = ['','','','',''];
let auPhotoFiles = [null,null,null,null,null];
let auPhotoMemos = ['','','','',''];

// ── Helpers ────────────────────────────────
const $ = id => document.getElementById(id);
const showToast = msg => {
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
};
const hideLoading = () => $('loading').style.display = 'none';
const showScreen = id => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  const navScreens = ['home','add-font','add-usage'];
  $('bottom-nav').style.display = navScreens.includes(id.replace('screen-','')) ? 'flex' : 'none';
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === id.replace('screen-',''));
  });
  window.scrollTo(0,0);
};

// ── Auth ───────────────────────────────────
onAuthStateChanged(auth, user => {
  hideLoading();
  if (user) {
    showScreen('screen-home');
    loadFonts();
  } else {
    showScreen('screen-login');
  }
});

$('login-btn').addEventListener('click', async () => {
  const email = $('login-email').value.trim();
  const pw = $('login-password').value;
  $('login-error').textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    $('login-error').textContent = 'メールアドレスまたはパスワードが違います';
  }
});

$('login-email').addEventListener('keydown', e => { if(e.key==='Enter') $('login-btn').click(); });
$('login-password').addEventListener('keydown', e => { if(e.key==='Enter') $('login-btn').click(); });

$('logout-btn').addEventListener('click', async () => {
  await signOut(auth);
});

// ── Load fonts ─────────────────────────────
async function loadFonts() {
  try {
    const q = query(collection(db,'fonts'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    fonts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderHome();
  } catch(e) {
    console.error(e);
  }
}

// ── Render HOME ────────────────────────────
function renderHome() {
  renderCarousel();
  renderFontList();
}

function renderCarousel() {
  const wrap = $('home-carousel');
  const recent = [...fonts].slice(0,5).filter(f => f.photos && f.photos[0]);
  if (!recent.length) {
    wrap.innerHTML = '<div class="carousel-empty">フォントを登録すると写真が表示されます</div>';
    return;
  }
  wrap.innerHTML = recent.map(f => `
    <div class="carousel-item" data-id="${f.id}">
      <img src="${f.photos[0].url}" alt="${f.name}" loading="lazy">
      <div class="carousel-label">${f.name}</div>
    </div>
  `).join('');
  wrap.querySelectorAll('.carousel-item').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.id));
  });
}

function renderFontList() {
  const wrap = $('font-list');
  let list = [...fonts];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(f =>
      (f.name||'').toLowerCase().includes(q) ||
      (f.maker||'').toLowerCase().includes(q) ||
      (f.memo||'').toLowerCase().includes(q)
    );
  }
  if (sortMode === 'fav') {
    list = list.filter(f => f.favorite);
  }
  if (!list.length) {
    wrap.innerHTML = `<div class="empty-state">
      <svg class="empty-icon" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="32" y1="8" x2="8" y2="56" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <line x1="32" y1="8" x2="56" y2="56" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <line x1="18" y1="38" x2="46" y2="38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
      フォントがまだありません<br>「フォント追加」から登録しましょう
    </div>`;
    return;
  }
  wrap.innerHTML = list.map(f => `
    <div class="font-card" data-id="${f.id}">
      <div class="font-thumb">
      ${f.photos && f.photos[0] ? `<img src="${f.photos[0].url}" loading="lazy">` : `<svg width="28" height="28" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="32" y1="8" x2="8" y2="56" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="32" y1="8" x2="56" y2="56" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="18" y1="38" x2="46" y2="38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>`}
      </div>
      <div class="font-info">
        <div class="font-name">${f.name}</div>
        <div class="font-maker">${f.maker||''}</div>
        <div><span class="font-cat-badge">${f.category||''}</span></div>
      </div>
      <button class="fav-btn ${f.favorite?'active':''}" data-id="${f.id}">♡</button>
      <span style="color:var(--c-text-sub);font-size:18px;">›</span>
    </div>
  `).join('');

  wrap.querySelectorAll('.font-card').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('fav-btn')) return;
      openDetail(el.dataset.id);
    });
  });
  wrap.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); toggleFav(btn.dataset.id); });
  });
}

// ── Search / Sort ──────────────────────────
$('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderFontList();
});
$('sort-btn').addEventListener('click', () => {
  sortMode = sortMode === 'new' ? 'fav' : 'new';
  $('sort-label').textContent = sortMode === 'new' ? '新しい順' : 'お気に入り';
  renderFontList();
});

// ── Fav ───────────────────────────────────
async function toggleFav(id) {
  const f = fonts.find(x=>x.id===id);
  if (!f) return;
  f.favorite = !f.favorite;
  await updateDoc(doc(db,'fonts',id), { favorite: f.favorite });
  renderFontList();
  if (currentFontId === id) {
    const btn = $('detail-fav');
    btn.textContent = f.favorite ? '♥' : '♡';
    btn.style.color = f.favorite ? '#e06090' : '';
  }
}

// ── Detail ────────────────────────────────
async function openDetail(id) {
  currentFontId = id;
  const f = fonts.find(x=>x.id===id);
  if (!f) return;

  // load usages
  const usnap = await getDocs(collection(db,'fonts',id,'usages'));
  const usages = usnap.docs.map(d=>({id:d.id,...d.data()}))
    .sort((a,b)=> (b.date||'').localeCompare(a.date||''));

  const favBtn = $('detail-fav');
  favBtn.textContent = f.favorite ? '♥' : '♡';
  favBtn.style.color = f.favorite ? '#e06090' : '';
  favBtn.onclick = () => toggleFav(id);

  const photos = f.photos||[];
  $('detail-content').innerHTML = `
    ${photos[0] ? `<div class="detail-hero"><img src="${photos[0].url}" alt="${f.name}"></div>` : ''}
    <div class="detail-body">
      <div class="detail-title">${f.name}</div>
      ${f.reading?`<div class="detail-reading">（${f.reading}）</div>`:''}
      <div class="detail-maker">${f.maker||''}</div>
      <span class="chip">${f.category||''}</span>

      ${f.memo?`<div class="detail-section"><h3>MEMO</h3><div class="memo-text">${f.memo.replace(/\n/g,'<br>')}</div></div>`:''}

      ${photos.length?`
      <div class="detail-section">
        <h3>PHOTOS</h3>
        <div class="photos-grid">
          ${photos.map((p,i)=>`
            <div class="photo-thumb" data-url="${p.url}" data-memo="${p.memo||''}">
              <img src="${p.url}" loading="lazy">
            </div>
          `).join('')}
        </div>
      </div>`:''}

      <div class="divider"></div>

      <div class="detail-section">
        <h3>フォント用例</h3>
        ${usages.length ? `
          <div class="usage-grid">
            ${usages.map(u=>`
              <div class="usage-card" data-font-id="${id}" data-usage-id="${u.id}">
                ${u.photos&&u.photos[0]?`<img class="usage-card-img" src="${u.photos[0].url}" loading="lazy">`:`<div class="usage-card-img" style="display:flex;align-items:center;justify-content:center;"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#c0b8d8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></div>`}
                <div class="usage-card-info">
                  <div class="usage-card-date">${u.date||''}</div>
                  <div class="usage-card-place">${u.place||'場所未記入'}</div>
                </div>
              </div>
            `).join('')}
          </div>
        ` : '<div style="color:var(--c-text-sub);font-size:13px;">用例はまだありません</div>'}
      </div>
    </div>
  `;

  // photo lightbox
  $('detail-content').querySelectorAll('.photo-thumb').forEach(el => {
    el.addEventListener('click', () => openLightbox(el.dataset.url, el.dataset.memo));
  });
  // usage detail
  $('detail-content').querySelectorAll('.usage-card').forEach(el => {
    el.addEventListener('click', () => openUsageDetail(el.dataset.fontId, el.dataset.usageId, usages));
  });

  showScreen('screen-detail');
}

$('detail-back').addEventListener('click', () => showScreen('screen-home'));

// ── Usage Detail ──────────────────────────
function openUsageDetail(fontId, usageId, usages) {
  const u = usages.find(x=>x.id===usageId);
  if (!u) return;
  const f = fonts.find(x=>x.id===fontId);
  const photos = u.photos||[];
  $('usage-detail-content').innerHTML = `
    ${photos[0]?`<div class="detail-hero"><img src="${photos[0].url}" alt="用例写真"></div>`:''}
    <div class="detail-body">
      <div style="font-size:13px;color:var(--c-text-sub);">登録日：${u.date||'-'}</div>
      <div class="detail-title" style="font-size:18px;margin-top:4px;">${u.place||'場所未記入'}</div>
      ${f?`<div class="detail-maker" style="margin-top:4px;">${f.name}</div>`:''}

      ${photos.length?`
        <div class="detail-section">
          <h3>PHOTOS</h3>
          <div class="photos-grid">
            ${photos.map(p=>`
              <div class="photo-thumb" data-url="${p.url}" data-memo="${p.memo||''}">
                <img src="${p.url}" loading="lazy">
              </div>
            `).join('')}
          </div>
        </div>`:''}
    </div>
  `;
  $('usage-detail-content').querySelectorAll('.photo-thumb').forEach(el => {
    el.addEventListener('click', () => openLightbox(el.dataset.url, el.dataset.memo));
  });
  showScreen('screen-usage-detail');
}
$('usage-detail-back').addEventListener('click', () => {
  if (currentFontId) openDetail(currentFontId);
  else showScreen('screen-home');
});

// ── Lightbox ──────────────────────────────
function openLightbox(url, memo) {
  $('lightbox-img').src = url;
  $('lightbox-memo').textContent = memo||'';
  $('lightbox').classList.add('active');
}
$('lightbox-close').addEventListener('click', () => $('lightbox').classList.remove('active'));
$('lightbox').addEventListener('click', e => { if(e.target===$('lightbox')) $('lightbox').classList.remove('active'); });

// ── Photo slots (reusable) ─────────────────
function buildPhotoSlots(containerId, memoWrapId, filesArr, memosArr) {
  const wrap = $(containerId);
  const memoWrap = $(memoWrapId);
  wrap.innerHTML = '';
  memoWrap.innerHTML = '';

  for (let i=0;i<5;i++) {
    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    slot.dataset.idx = i;
    if (filesArr[i]) {
      const url = URL.createObjectURL(filesArr[i]);
      slot.innerHTML = `<img src="${url}"><button class="remove-btn" data-idx="${i}">✕</button>`;
    } else {
      slot.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    }
    wrap.appendChild(slot);
  }

  // memo inputs for uploaded photos
  const hasMemos = filesArr.some(f=>f);
  if (hasMemos) {
    const label = document.createElement('label');
    label.style.cssText = 'display:block;font-size:12px;color:var(--c-text-sub);margin-bottom:8px;font-weight:500;';
    label.textContent = '写真へのメモ';
    memoWrap.appendChild(label);
    filesArr.forEach((f,i) => {
      if (!f) return;
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = `写真${i+1}へのメモ`;
      inp.value = memosArr[i]||'';
      inp.style.cssText = 'width:100%;padding:10px 12px;border:1.5px solid var(--c-border);border-radius:10px;font-size:14px;margin-bottom:8px;font-family:inherit;color:var(--c-text);background:rgba(255,255,255,0.9);outline:none;';
      inp.addEventListener('input', () => memosArr[i] = inp.value);
      memoWrap.appendChild(inp);
    });
  }

  // click to add
  wrap.querySelectorAll('.photo-slot').forEach(slot => {
    slot.addEventListener('click', e => {
      if (e.target.classList.contains('remove-btn')) {
        const idx = parseInt(e.target.dataset.idx);
        filesArr[idx] = null; memosArr[idx] = '';
        buildPhotoSlots(containerId, memoWrapId, filesArr, memosArr);
        return;
      }
      const idx = parseInt(slot.dataset.idx);
      if (filesArr[idx]) return;
      const input = document.createElement('input');
      input.type='file'; input.accept='image/*';
      input.onchange = e2 => {
        filesArr[idx] = e2.target.files[0];
        buildPhotoSlots(containerId, memoWrapId, filesArr, memosArr);
      };
      input.click();
    });
  });
}

// ── ADD FONT screen ────────────────────────
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const s = btn.dataset.screen;
    if (s === 'home') { showScreen('screen-home'); renderHome(); }
    else if (s === 'add-font') { initAddFont(); showScreen('screen-add-font'); }
    else if (s === 'add-usage') { initAddUsage(); showScreen('screen-add-usage'); }
  });
});

$('add-font-back').addEventListener('click', () => { showScreen('screen-home'); renderHome(); });

function initAddFont() {
  $('af-name').value=''; $('af-reading').value=''; $('af-maker').value=''; $('af-memo').value='';
  document.querySelector('input[name="af-cat"][value="ゴシック"]').checked = true;
  afPhotoFiles = [null,null,null,null,null];
  afPhotoMemos = ['','','','',''];
  buildPhotoSlots('af-photos','af-photo-memos-wrap',afPhotoFiles,afPhotoMemos);
}

$('af-submit').addEventListener('click', async () => {
  const name = $('af-name').value.trim();
  if (!name) { showToast('フォント名を入力してください'); return; }
  $('af-submit').disabled = true;
  $('af-submit').textContent = '登録中…';
  try {
    const photos = await uploadPhotos('fonts', afPhotoFiles, afPhotoMemos);
    const cat = document.querySelector('input[name="af-cat"]:checked').value;
    const docRef = await addDoc(collection(db,'fonts'), {
      name, reading: $('af-reading').value.trim(),
      maker: $('af-maker').value.trim(),
      category: cat, memo: $('af-memo').value.trim(),
      photos, favorite: false, createdAt: serverTimestamp()
    });
    fonts.unshift({ id:docRef.id, name, reading:$('af-reading').value.trim(), maker:$('af-maker').value.trim(), category:cat, memo:$('af-memo').value.trim(), photos, favorite:false });
    showToast('登録しました！');
    initAddFont();
    showScreen('screen-home');
    renderHome();
  } catch(e) {
    console.error(e); showToast('エラーが発生しました');
  }
  $('af-submit').disabled = false;
  $('af-submit').textContent = '登録する';
});

// ── ADD USAGE screen ───────────────────────
$('add-usage-back').addEventListener('click', () => { showScreen('screen-home'); renderHome(); });

function initAddUsage() {
  $('usage-step1').style.display = 'block';
  $('usage-step2').style.display = 'none';
  $('usage-font-search').value = '';
  $('usage-font-results').innerHTML = '';
  selectedUsageFontId = null;
  const today = new Date().toISOString().split('T')[0];
  $('au-date').value = today;
  $('au-place').value = '';
  auPhotoFiles = [null,null,null,null,null];
  auPhotoMemos = ['','','','',''];
  buildPhotoSlots('au-photos','au-photo-memos-wrap',auPhotoFiles,auPhotoMemos);
}

$('usage-font-search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  const results = fonts.filter(f => (f.name||'').toLowerCase().includes(q));
  const wrap = $('usage-font-results');
  if (!q) { wrap.innerHTML=''; return; }
  if (!results.length) { wrap.innerHTML='<div style="color:var(--c-text-sub);font-size:13px;padding:8px 0;">見つかりません</div>'; return; }
  wrap.innerHTML = results.map(f=>`
    <div class="font-card" data-id="${f.id}" style="cursor:pointer;">
      <div class="font-thumb">${f.photos&&f.photos[0]?`<img src="${f.photos[0].url}">`:`<svg width="28" height="28" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="32" y1="8" x2="8" y2="56" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="32" y1="8" x2="56" y2="56" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="18" y1="38" x2="46" y2="38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>`}</div>
      <div class="font-info"><div class="font-name">${f.name}</div><div class="font-maker">${f.maker||''}</div></div>
      <span style="color:var(--c-text-sub);font-size:18px;">›</span>
    </div>
  `).join('');
  wrap.querySelectorAll('.font-card').forEach(el => {
    el.addEventListener('click', () => {
      selectedUsageFontId = el.dataset.id;
      const f = fonts.find(x=>x.id===el.dataset.id);
      $('usage-selected-font').textContent = `${f.name}${f.maker?' / '+f.maker:''}`;
      $('usage-step1').style.display='none';
      $('usage-step2').style.display='block';
      buildPhotoSlots('au-photos','au-photo-memos-wrap',auPhotoFiles,auPhotoMemos);
    });
  });
});

$('usage-step2-back').addEventListener('click', () => {
  $('usage-step1').style.display='block';
  $('usage-step2').style.display='none';
});

$('au-submit').addEventListener('click', async () => {
  if (!selectedUsageFontId) return;
  const date = $('au-date').value;
  if (!date) { showToast('日付を入力してください'); return; }
  $('au-submit').disabled = true;
  $('au-submit').textContent = '登録中…';
  try {
    const photos = await uploadPhotos(`fonts/${selectedUsageFontId}/usages`, auPhotoFiles, auPhotoMemos);
    await addDoc(collection(db,'fonts',selectedUsageFontId,'usages'), {
      date, place: $('au-place').value.trim(),
      photos, createdAt: serverTimestamp()
    });
    showToast('用例を登録しました！');
    initAddUsage();
    showScreen('screen-home');
    renderHome();
  } catch(e) {
    console.error(e); showToast('エラーが発生しました');
  }
  $('au-submit').disabled = false;
  $('au-submit').textContent = '登録する';
});

// ── Upload photos ──────────────────────────
async function uploadPhotos(pathPrefix, filesArr, memosArr) {
  const results = [];
  for (let i=0;i<filesArr.length;i++) {
    if (!filesArr[i]) continue;
    const file = filesArr[i];
    const compressed = await compressImage(file, 1200, 0.82);
    const storageRef = ref(storage, `${pathPrefix}/${Date.now()}_${i}_${file.name}`);
    await uploadBytes(storageRef, compressed);
    const url = await getDownloadURL(storageRef);
    results.push({ url, memo: memosArr[i]||'' });
  }
  return results;
}

// ── Image compress ─────────────────────────
function compressImage(file, maxSize, quality) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h*maxSize/w); w = maxSize; }
        else { w = Math.round(w*maxSize/h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob => { URL.revokeObjectURL(url); resolve(blob); }, 'image/jpeg', quality);
    };
    img.src = url;
  });
}
