<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MyMoji Book</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --c-lavender: #d3c3fc;
    --c-sky: #9ac5fc;
    --c-mint: #b8f0d8;
    --c-peach: #fbc8d4;
    --c-white: #ffffff;
    --c-bg: #f4f0ff;
    --c-text: #2d2640;
    --c-text-sub: #7a7090;
    --c-border: #e0d8f8;
    --c-card: rgba(255,255,255,0.82);
    --radius: 20px;
    --radius-sm: 12px;
    --nav-h: 64px;
    --header-h: 56px;
    --max-w: 600px;
    --col: 1;
  }

  /* iPad Pro: 2カラムレイアウト */
  @media (min-width: 768px) {
    :root {
      --max-w: 1024px;
      --col: 2;
      --nav-h: 72px;
      --header-h: 64px;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  button, a, .nav-btn, .back-btn, .fav-btn, .cat-chip, .sort-btn, .font-card, .usage-card, .carousel-item, .photo-thumb, .photo-slot { touch-action: manipulation; }

  body {
    font-family: 'Zen Maru Gothic', 'Meiryo UI', sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  #app {
    width: 100%;
    max-width: var(--max-w);
    min-height: 100vh;
    position: relative;
    background: var(--c-bg);
  }

  /* ── Fluid background blobs ── */
  .fluid-bg {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: var(--max-w);
    height: 100vh;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(48px);
    opacity: 0.65;
    animation: blobFloat 12s ease-in-out infinite alternate;
  }
  .blob-1 { width: 260px; height: 260px; background: var(--c-lavender); top: -60px; left: -40px; animation-delay: 0s; }
  .blob-2 { width: 200px; height: 200px; background: var(--c-sky); top: 100px; right: -30px; animation-delay: 3s; }
  .blob-3 { width: 180px; height: 180px; background: var(--c-peach); top: 50%; left: 20px; animation-delay: 6s; }
  .blob-4 { width: 220px; height: 220px; background: var(--c-mint); bottom: 80px; right: -20px; animation-delay: 2s; }
  @keyframes blobFloat {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(12px, 16px) scale(1.08); }
  }

  /* ── Screens ── */
  .screen {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding-bottom: calc(var(--nav-h) + 16px);
  }
  .screen.active { display: block; }
  #screen-login { padding-bottom: 0; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  #screen-login.active { display: flex; }

  /* ── Header ── */
  .app-header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: var(--max-w);
    z-index: 10;
    background: rgba(244,240,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--c-border);
  }
  /* ヘッダー分のpadding-topをscreenに追加 */
  .screen { padding-top: var(--header-h); }
  .app-header h1 {
    font-size: 27px;
    font-weight: 800;
    letter-spacing: 0.02em;
    background: linear-gradient(135deg, #9b7fe8, #5aaae8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-btn {
    background: none; border: none; cursor: pointer;
    color: var(--c-text-sub); font-size: 24px; padding: 4px;
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: var(--max-w);
    height: var(--nav-h);
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--c-border);
    display: flex;
    z-index: 100;
  }
  @media (min-width: 768px) {
    .nav-btn { font-size: 14px; gap: 6px; }
    .nav-btn .icon svg { width: 28px; height: 28px; }
  }
  .nav-btn {
    flex: 1; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; color: #b0a8c8; font-size: 12px; font-weight: 500;
    transition: color 0.2s;
  }
  .nav-btn .icon { font-size: 26px; display: flex; align-items: center; justify-content: center; }
  .nav-btn.active {
    font-weight: 700;
    background: linear-gradient(135deg, #b8a0f0, #7ab8f5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .nav-btn .icon-outline { display: block; }
  .nav-btn .icon-filled { display: none; }
  .nav-btn.active .icon-outline { display: none; }
  .nav-btn.active .icon-filled { display: block; }

  /* ── Login ── */
  .login-logo {
    font-size: 28px; font-weight: 800; letter-spacing: 0.02em;
    background: linear-gradient(135deg, #9b7fe8, #5aaae8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 6px;
  }
  .login-sub { color: var(--c-text-sub); font-size: 15px; margin-bottom: 40px; }
  .login-card {
    background: var(--c-card);
    border-radius: var(--radius);
    padding: 32px 28px;
    width: calc(100% - 48px);
    max-width: 440px;
    box-shadow: 0 8px 40px rgba(155,127,232,0.12);
    border: 1px solid var(--c-border);
  }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 14px; color: var(--c-text-sub); margin-bottom: 6px; font-weight: 500; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--c-border);
    border-radius: var(--radius-sm);
    font-size: 17px; color: var(--c-text);
    background: rgba(255,255,255,0.9);
    outline: none; transition: border-color 0.2s;
    font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--c-lavender);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #b8a0f0, #7ab8f5);
    border: none; border-radius: 50px;
    color: white; font-size: 17px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em;
    transition: opacity 0.2s, transform 0.1s;
    font-family: inherit;
  }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

  .btn-secondary {
    background: none; border: 1.5px solid var(--c-border);
    border-radius: 50px; color: var(--c-text-sub);
    font-size: 15px; cursor: pointer;
    margin-top: 12px; display: block; text-align: center;
    width: 100%; padding: 10px;
    font-family: inherit;
    transition: background 0.2s;
  }
  .btn-secondary:active { background: var(--c-border); }

  .error-msg { color: #e05c7a; font-size: 15px; margin-top: 10px; text-align: center; }

  /* ── Cards / List ── */
  .section-pad { padding: 16px 20px; }

  .font-list { display: grid; grid-template-columns: repeat(var(--col), 1fr); gap: 10px; padding: 0 16px 16px; }

  .font-card {
    background: var(--c-card);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 16px rgba(155,127,232,0.08);
    border: 1px solid var(--c-border);
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  }
  .font-card:active { transform: scale(0.98); box-shadow: 0 1px 8px rgba(155,127,232,0.1); }

  .font-thumb {
    width: 52px; height: 52px; border-radius: 14px;
    object-fit: cover; background: var(--c-border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: var(--c-text-sub);
    overflow: hidden;
  }
  .font-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .font-info { flex: 1; min-width: 0; }
  .font-name { font-size: 18px; font-weight: 700; }
  .font-maker { font-size: 14px; color: var(--c-text-sub); margin-top: 2px; }
  .font-cat-badge {
    display: inline-block; font-size: 12px; padding: 2px 8px;
    border-radius: 20px; margin-top: 5px; font-weight: 600;
    background: linear-gradient(135deg, var(--c-lavender), var(--c-sky));
    color: #5a4a8a;
  }

  .fav-btn {
    background: none; border: none; cursor: pointer;
    flex-shrink: 0; padding: 4px; transition: transform 0.15s;
    display: flex; align-items: center;
  }
  .fav-btn:active { transform: scale(1.25); }

  /* ── Search bar ── */
  .search-wrap {
    padding: 10px 16px 6px;
    display: flex; gap: 8px; align-items: center;
  }
  .search-box {
    flex: 1; min-width: 0; display: flex; align-items: center;
    background: var(--c-card); border: 1.5px solid var(--c-border);
    border-radius: 50px; padding: 8px 14px; gap: 8px;
  }
  .form-group input[type="date"] {
    width: 100%;
    max-width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--c-border);
    border-radius: var(--radius-sm);
    font-size: 16px;
    color: var(--c-text);
    background: rgba(255,255,255,0.9);
    outline: none;
    font-family: inherit;
    box-sizing: border-box;
    accent-color: #9b7fe8;
  }
  /* カレンダーポップアップがはみ出ないよう */
  input[type="date"]::-webkit-calendar-picker-indicator {
    cursor: pointer;
    opacity: 0.6;
    filter: hue-rotate(220deg) saturate(1.5);
  }
  .search-icon { color: var(--c-text-sub); display: flex; align-items: center; flex-shrink: 0; }
  .search-box input {
    border: none; background: none; outline: none;
    font-size: 16px; color: var(--c-text); flex: 1; min-width: 0;
    font-family: inherit;
  }
  .sort-btn {
    background: var(--c-card); border: 1.5px solid var(--c-border);
    border-radius: 50px; padding: 8px 12px;
    font-size: 14px; color: var(--c-text-sub);
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    display: flex; align-items: center; gap: 4px;
    font-family: inherit;
  }

  /* ── Carousel ── */
  .carousel-wrap {
    padding: 16px 16px 8px;
  }
  .carousel {
    display: flex; gap: 10px; overflow-x: auto;
    scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
    padding-bottom: 8px; scrollbar-width: none;
  }
  .carousel::-webkit-scrollbar { display: none; }
  .carousel-item {
    flex-shrink: 0; width: 200px; height: 130px;
    border-radius: var(--radius); overflow: hidden;
    scroll-snap-align: start; cursor: pointer;
    background: var(--c-border);
    position: relative;
  }
  @media (min-width: 768px) {
    .carousel-item { width: 280px; height: 180px; }
  }
  .carousel-item img { width: 100%; height: 100%; object-fit: cover; }
  .carousel-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(45,38,64,0.7));
    color: white; font-size: 14px; font-weight: 600;
    padding: 8px 12px;
  }
  .carousel-empty {
    width: 100%; height: 100px;
    background: var(--c-card); border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    color: var(--c-text-sub); font-size: 15px;
    border: 1.5px dashed var(--c-border);
  }

  /* ── Section label ── */
  .sec-label {
    font-size: 14px; font-weight: 700; color: var(--c-text-sub);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 16px 4px;
  }

  /* ── Detail page ── */
  .detail-hero {
    width: 100%; height: 220px;
    background: var(--c-border); overflow: hidden; position: relative;
  }
  @media (min-width: 768px) {
    .detail-hero { height: 320px; }
    .detail-body { padding: 28px 32px; }
    .photos-grid { grid-template-columns: repeat(5, 1fr); }
    .usage-grid { grid-template-columns: repeat(3, 1fr); }
    .form-page { max-width: 600px; margin: 0 auto; }
  }
  .detail-hero img { width: 100%; height: 100%; object-fit: cover; }
  .detail-body { padding: 20px; }
  .detail-title { font-size: 24px; font-weight: 800; }
  .detail-reading { font-size: 15px; color: var(--c-text-sub); margin-top: 2px; }
  .detail-maker { font-size: 16px; color: var(--c-text-sub); margin-top: 4px; }
  .chip {
    display: inline-block; font-size: 13px; padding: 4px 12px;
    border-radius: 20px; font-weight: 700;
    background: linear-gradient(135deg, var(--c-lavender), var(--c-sky));
    color: #5a4a8a; margin-top: 10px;
  }
  .detail-section { margin-top: 22px; }
  .detail-section h3 { font-size: 15px; font-weight: 700; color: var(--c-text-sub); margin-bottom: 10px; letter-spacing: 0.05em; }
  .memo-text { font-size: 16px; line-height: 1.7; color: var(--c-text); }
  .divider { height: 1px; background: var(--c-border); margin: 20px 0; }

  /* photos grid */
  .photos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .photo-thumb {
    aspect-ratio: 1; border-radius: 10px; overflow: hidden;
    background: var(--c-border); cursor: pointer;
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }

  /* usage cards */
  .usage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .usage-card {
    background: var(--c-card); border-radius: var(--radius-sm);
    overflow: hidden; cursor: pointer;
    border: 1px solid var(--c-border);
  }
  .usage-card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: var(--c-border); }
  .usage-card-info { padding: 8px 10px; }
  .usage-card-date { font-size: 12px; color: var(--c-text-sub); }
  .usage-card-place { font-size: 14px; font-weight: 600; margin-top: 2px; }

  /* ── Photo upload ── */
  .photo-upload-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .photo-slot {
    width: 70px; height: 70px; border-radius: 12px;
    border: 2px dashed var(--c-border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden; position: relative;
    background: rgba(255,255,255,0.6);
  }
  .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
  .photo-slot .add-icon { font-size: 26px; color: var(--c-text-sub); }
  .photo-slot .remove-btn {
    position: absolute; top: 2px; right: 2px;
    background: rgba(0,0,0,0.4); color: white;
    border: none; border-radius: 50%; width: 18px; height: 18px;
    font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .photo-slot .edit-btn {
    position: absolute; bottom: 2px; right: 2px;
    background: rgba(0,0,0,0.45); color: white;
    border: none; border-radius: 50%; width: 20px; height: 20px;
    font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }

  /* フォーム系ヘッダーはサイズ小さめ */
  #screen-add-font .app-header h1,
  #screen-add-usage .app-header h1,
  #screen-edit-font .app-header h1,
  #screen-edit-usage .app-header h1,
  #screen-detail .app-header h1,
  #screen-usage-detail .app-header h1,
  #screen-edit-font .app-header h1,
  #screen-unassigned-detail .app-header h1 {
    font-size: 17px;
    font-weight: 800;
  }
  #context-menu {
    display: none; position: fixed; z-index: 300;
    background: white; border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    overflow: hidden; min-width: 180px;
    border: 1px solid var(--c-border);
  }
  #context-menu.active { display: block; }
  .ctx-item {
    padding: 14px 20px; font-size: 15px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--c-border);
    color: var(--c-text); font-family: inherit;
    background: none; border-left: none; border-right: none;
    width: 100%; text-align: left;
  }
  .ctx-item:last-child { border-bottom: none; }
  .ctx-item:active { background: var(--c-bg); }
  .ctx-item.danger { color: #e05c7a; }
  #context-overlay {
    display: none; position: fixed; inset: 0; z-index: 299;
  }
  #context-overlay.active { display: block; }

  /* ── Category filter ── */
  .cat-filter-wrap {
    display: flex; gap: 8px; padding: 4px 16px 10px;
    overflow-x: auto; scrollbar-width: none;
  }
  .cat-filter-wrap::-webkit-scrollbar { display: none; }
  .cat-chip {
    flex-shrink: 0; padding: 6px 16px; border-radius: 50px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1.5px solid var(--c-border);
    background: var(--c-card); color: var(--c-text-sub);
    transition: all 0.15s; font-family: inherit;
  }
  .cat-chip.active {
    background: linear-gradient(135deg, var(--c-lavender), var(--c-sky));
    border-color: transparent; color: #5a4a8a;
  }

  /* ── Photo editor modal ── */
  #photo-editor {
    display: none; position: fixed; inset: 0; z-index: 250;
    background: #000;
    flex-direction: column; align-items: stretch;
  }
  #photo-editor.active { display: flex; }

  /* 写真プレビューエリア */
  #pe-preview-area {
    flex: 1; position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #111;
  }
  #photo-editor-img {
    max-width: 100%; max-height: 100%;
    object-fit: contain; display: block;
  }
  /* クロップ用オーバーレイ（写真の上に重ねる） */
  #pe-crop-overlay {
    position: absolute; inset: 0;
    cursor: crosshair; display: none;
  }
  #pe-crop-overlay.active { display: block; }
  #pe-crop-rect {
    position: absolute; border: 2px solid white;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
    pointer-events: none; display: none;
  }

  /* コントロールエリア（下部固定） */
  #pe-controls {
    flex-shrink: 0;
    background: rgba(20,20,20,0.97);
    padding: 12px 16px 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .pe-tab-row { display: flex; gap: 8px; justify-content: center; }
  .pe-tab {
    padding: 7px 18px; border-radius: 50px;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08); color: white;
    font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; touch-action: manipulation;
  }
  .pe-tab.active { background: linear-gradient(135deg, #b8a0f0, #7ab8f5); border-color: transparent; }

  .pe-panel { display: none; flex-direction: column; gap: 10px; }
  .pe-panel.active { display: flex; }

  .pe-slider-row { display: flex; align-items: center; gap: 10px; }
  .pe-slider-row label { color: white; font-size: 12px; width: 56px; flex-shrink: 0; }
  .pe-slider-row input[type=range] { flex: 1; accent-color: #b8a0f0; height: 28px; }
  .pe-slider-row span { color: rgba(255,255,255,0.7); font-size: 12px; width: 28px; text-align: right; }

  .pe-btn-row { display: flex; gap: 10px; justify-content: center; }
  .editor-btn {
    background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 50px; color: white; padding: 10px 20px;
    font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    font-family: inherit; font-weight: 600;
    transition: background 0.15s; touch-action: manipulation; flex: 1; justify-content: center;
  }
  .editor-btn:active { background: rgba(255,255,255,0.3); }
  .editor-btn-primary {
    background: linear-gradient(135deg, #b8a0f0, #7ab8f5);
    border-color: transparent;
  }

  /* 上部ボタン（×と編集アイコン） */
  #pe-header {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: flex-end; align-items: center;
    padding: 12px 14px; gap: 8px; z-index: 10;
    pointer-events: none;
  }
  #pe-header button { pointer-events: all; }
  #photo-editor-close {
    background: rgba(0,0,0,0.5); border: none; color: white;
    border-radius: 50%; width: 36px; height: 36px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  .weight-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .weight-chip {
    padding: 4px 12px; border-radius: 50px;
    font-size: 13px; font-weight: 600;
    background: rgba(155,127,232,0.1);
    color: #7a5cc0; border: 1px solid rgba(155,127,232,0.25);
  }

  /* ── Edit button in header ── */
  .edit-header-btn {
    background: none; border: none; cursor: pointer;
    color: var(--c-text-sub); padding: 4px;
    display: flex; align-items: center;
  }

  /* ── Confirm dialog ── */
  #confirm-dialog {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
  }
  #confirm-dialog.active { display: flex; }
  .confirm-box {
    background: white; border-radius: var(--radius);
    padding: 28px 24px; width: calc(100% - 48px); max-width: 320px;
    text-align: center;
  }
  .confirm-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .confirm-box p { font-size: 15px; color: var(--c-text-sub); margin-bottom: 20px; }
  .confirm-btns { display: flex; gap: 10px; }
  .confirm-btns button { flex: 1; padding: 12px; border-radius: 50px; border: none; cursor: pointer; font-size: 16px; font-weight: 600; font-family: inherit; }
  .confirm-cancel { background: var(--c-border); color: var(--c-text); }
  .confirm-delete { background: #e05c7a; color: white; }
  .suggestions-box {
    position: absolute; top: 100%; left: 0; right: 0;
    background: white; border: 1.5px solid var(--c-border);
    border-radius: var(--radius-sm); margin-top: 4px;
    max-height: 220px; overflow-y: auto;
    z-index: 50; box-shadow: 0 8px 24px rgba(155,127,232,0.12);
    display: none;
  }
  .suggestions-box.open { display: block; }
  .suggestion-item {
    padding: 12px 16px; cursor: pointer;
    border-bottom: 1px solid var(--c-border);
    transition: background 0.15s;
    display: flex; flex-direction: column; gap: 2px;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:active { background: var(--c-bg); }
  .suggestion-name { font-size: 17px; font-weight: 600; color: var(--c-text); }
  .suggestion-meta { font-size: 13px; color: var(--c-text-sub); }
  .suggestion-highlight { color: #9b7fe8; }

  /* ── Form page ── */
  .form-page { padding: 16px 20px; }
  .form-page h2 { font-size: 20px; font-weight: 400; margin-bottom: 20px; }

  .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .radio-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 16px; cursor: pointer;
  }
  .radio-label input { accent-color: #9b7fe8; width: 16px; height: 16px; }

  /* ── Lightbox ── */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  #lightbox.active { display: flex; }
  #lightbox img { max-width: 94vw; max-height: 78vh; border-radius: 12px; object-fit: contain; }
  #lightbox-memo { color: white; font-size: 15px; margin-top: 10px; max-width: 80vw; text-align: center; }
  #lightbox-actions { display: none; }
  /* ×ボタンと編集ボタンを右上に並べる */
  #lightbox-close {
    position: absolute; bottom: 24px; right: 20px;
    color: white; background: rgba(0,0,0,0.5);
    border: none; border-radius: 50%;
    width: 44px; height: 44px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    touch-action: manipulation; z-index: 10;
  }
  #lightbox-edit-btn {
    position: absolute; bottom: 24px; right: 72px;
    color: white; background: rgba(0,0,0,0.5);
    border: none; border-radius: 50%;
    width: 44px; height: 44px;
    cursor: pointer; display: none; align-items: center; justify-content: center;
    touch-action: manipulation; z-index: 10;
  }
  #lightbox-edit-btn.visible { display: flex; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(45,38,64,0.88); color: white;
    padding: 10px 24px; border-radius: 50px;
    font-size: 15px; z-index: 300; opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Loading ── */
  #loading {
    position: fixed; inset: 0; z-index: 400;
    background: var(--c-bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .loading-logo {
    font-size: 30px; font-weight: 800;
    background: linear-gradient(135deg, #9b7fe8, #5aaae8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--c-border);
    border-top-color: #9b7fe8; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Back button ── */
  .back-btn { background: none; border: none; cursor: pointer; color: var(--c-text); padding: 8px; margin: 0; display: flex; align-items: center; justify-content: center; min-width: 44px; min-height: 44px; }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--c-text-sub); font-size: 16px; line-height: 2;
  }
  .empty-state .empty-icon { display: block; margin: 0 auto 16px; opacity: 0.4; }
</style>
</head>
<body>

<div id="app">

function searchFonts(query, lang) {
  if (!query || query.length < 1) return [];
  const q = query.toLowerCase();
  return FONT_DB[lang].filter(f => f.name.toLowerCase().includes(q)).slice(0, 8);
}

function highlightMatch(text, query) {
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) +
    `<span class="suggestion-highlight">${text.slice(idx, idx+query.length)}</span>` +
    text.slice(idx+query.length);
}

// ── Helpers ────────────────────────────────
const $ = id => document.getElementById(id);
const showToast = msg => {
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
};
const hideLoading = () => $('loading').style.display = 'none';
const showScreen = id => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  // ログイン画面以外は常にナビを表示
  $('bottom-nav').style.display = id === 'screen-login' ? 'none' : 'flex';
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === id.replace('screen-',''));
  });
  window.scrollTo(0,0);
};

// ── Auth ───────────────────────────────────
onAuthStateChanged(auth, user => {
  hideLoading();
  if (user) {
    showScreen('screen-home');
    loadFonts();
    loadUnassignedUsages();
  } else {
    showScreen('screen-login');
  }
});

$('login-btn').addEventListener('click', async () => {
  const email = $('login-email').value.trim();
  const pw = $('login-password').value;
  $('login-error').textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    $('login-error').textContent = 'メールアドレスまたはパスワードが違います';
  }
});

$('login-email').addEventListener('keydown', e => { if(e.key==='Enter') $('login-btn').click(); });
$('login-password').addEventListener('keydown', e => { if(e.key==='Enter') $('login-btn').click(); });

$('logout-btn').addEventListener('click', async () => {
  await signOut(auth);
});

// ── Load fonts ─────────────────────────────
async function loadFonts() {
  try {
    const q = query(collection(db,'fonts'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    fonts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderHome();
  } catch(e) {
    console.error(e);
  }
}

// ── Render HOME ────────────────────────────
function renderHome() {
  renderCarousel();
  renderFontList();
}

function renderCarousel() {
  const wrap = $('home-carousel');
  const recent = [...fonts].slice(0,5).filter(f => f.photos && f.photos[0]);
  if (!recent.length) {
    wrap.innerHTML = '<div class="carousel-empty">フォントを登録すると写真が表示されます</div>';
    return;
  }
  wrap.innerHTML = recent.map(f => `
    <div class="carousel-item" data-id="${f.id}">
      <img src="${f.photos[0].url}" alt="${f.name}" loading="lazy">
      <div class="carousel-label">${f.name}</div>
    </div>
  `).join('');
  wrap.querySelectorAll('.carousel-item').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.id));
  });
}

function renderFontList() {
  const wrap = $('font-list');
  let list = [...fonts];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(f =>
      (f.name||'').toLowerCase().includes(q) ||
      (f.maker||'').toLowerCase().includes(q) ||
      (f.memo||'').toLowerCase().includes(q)
    );
  }
  if (categoryFilter) {
    list = list.filter(f => f.category === categoryFilter);
  }
  if (langFilter) {
    const jaNames = new Set(FONT_DB.ja.map(x => x.name));
    const enNames = new Set(FONT_DB.en.map(x => x.name));
    if (langFilter === 'ja') list = list.filter(f => jaNames.has(f.name));
    if (langFilter === 'en') list = list.filter(f => enNames.has(f.name));
  }
  if (sortMode === 'fav') {
    list = list.filter(f => f.favorite);
  }
  if (!list.length) {
    wrap.innerHTML = `<div class="empty-state">
      <svg class="empty-icon" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="32" y1="8" x2="8" y2="56" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <line x1="32" y1="8" x2="56" y2="56" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <line x1="18" y1="38" x2="46" y2="38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
      フォントがまだありません<br>「フォント追加」から登録しましょう
    </div>`;
    return;
  }
  wrap.innerHTML = list.map(f => `
    <div class="font-card" data-id="${f.id}">
      <div class="font-thumb">
      ${f.photos && f.photos[0] ? `<img src="${f.photos[0].url}" loading="lazy">` : `<svg width="28" height="28" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="32" y1="8" x2="8" y2="56" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="32" y1="8" x2="56" y2="56" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="18" y1="38" x2="46" y2="38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>`}
      </div>
      <div class="font-info">
        <div class="font-name">${f.name}</div>
        <div class="font-maker">${f.maker||''}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:5px;"><span class="font-cat-badge" style="margin-top:0;">${f.category||''}</span>${f.basic ? `<span style="display:inline-flex;align-items:center;">${CROWN_FILLED}</span>` : ''}</div>
      </div>
      <button class="fav-btn" data-id="${f.id}">${f.favorite ? '<svg width="22" height="22" viewBox="0 0 24 24" fill="#e06090" stroke="#e06090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>' : '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c8c0dc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>'}</button>
      <span style="color:var(--c-text-sub);font-size: 20px;">›</span>
    </div>
  `).join('');

  wrap.querySelectorAll('.font-card').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('fav-btn')) return;
      openDetail(el.dataset.id);
    });
  });
  wrap.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); toggleFav(btn.dataset.id); });
  });
}

// ── Search / Sort ──────────────────────────
$('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderFontList();
});
$('sort-btn').addEventListener('click', () => {
  sortMode = sortMode === 'new' ? 'fav' : 'new';

  renderFontList();

// ── Cat chips per lang ────────────────────
const CAT_CHIPS = {
  '':   ['すべて', 'ゴシック', '明朝', 'セリフ', 'サンセリフ', 'UD', 'その他'],
  'ja': ['すべて', 'ゴシック', '明朝', 'UD', 'その他'],
  'en': ['すべて', 'セリフ', 'サンセリフ', 'UD', 'その他'],
};
const CAT_VALUES = {
  'すべて': '', 'ゴシック': 'ゴシック', '明朝': '明朝',
  'セリフ': 'セリフ', 'サンセリフ': 'サンセリフ', 'UD': 'UD', 'その他': 'その他',
};

function updateCatChips(lang) {
  const wrap = $('cat-filter-wrap');
  const labels = CAT_CHIPS[lang] || CAT_CHIPS[''];
  wrap.innerHTML = labels.map((label, i) =>
    `<button class="cat-chip${i === 0 ? ' active' : ''}" data-cat="${CAT_VALUES[label]}">${label}</button>`
  ).join('');
  categoryFilter = '';
  // 新しいチップにリスナーを再登録
  wrap.querySelectorAll('.cat-chip[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      wrap.querySelectorAll('.cat-chip[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      categoryFilter = btn.dataset.cat;
      renderFontList();
    });
  });
}

// ── Lang filter ────────────────────────────
document.querySelectorAll('[data-lang]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-lang]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    langFilter = btn.dataset.lang;
    updateCatChips(langFilter);
    renderFontList();
  });
});

// ── Category filter ────────────────────────
document.querySelectorAll('.cat-chip[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-chip[data-cat]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    categoryFilter = btn.dataset.cat;
    renderFontList();
  });
});

// ── Fav ───────────────────────────────────
async function toggleFav(id) {
  const f = fonts.find(x=>x.id===id);
  if (!f) return;
  f.favorite = !f.favorite;
  await updateDoc(doc(db,'fonts',id), { favorite: f.favorite });
  renderFontList();
  if (currentFontId === id) {
    const btn = $('detail-fav');
    btn.style.color=''; btn.innerHTML = f.favorite ? '<svg width="22" height="22" viewBox="0 0 24 24" fill="#e06090" stroke="#e06090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>' : '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c8c0dc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>';
    btn.style.color = f.favorite ? '#e06090' : '';
  }
}

async function toggleBasic(id) {
  const f = fonts.find(x=>x.id===id);
  if (!f) return;
  f.basic = !f.basic;
  await updateDoc(doc(db,'fonts',id), { basic: f.basic });
  renderFontList();
  const btn = $('detail-crown');
  if (btn) btn.innerHTML = f.basic ? CROWN_FILLED : CROWN_OUTLINE;
  showToast(f.basic ? '基本フォントに設定しました' : '基本フォントを解除しました');
}

async function openDetail(id) {

  const usnap = await getDocs(collection(db,'fonts',id,'usages'));

      <img id="detail-cover-img" src="${photos[0].url}" alt="${f.name}" style="width:100%;height:100%;object-fit:cover;object-position:${f.coverPosition||'50% 50%'};transform-origin:center;transition:none;">      <div id="detail-hero-adjust-btn" style="position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.5);color:white;font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:5px;touch-action:manipulation;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
        位置を調整
      </div>
      ${photos.length > 1 ? `<div style="position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.45);color:white;font-size:12px;padding:4px 12px;border-radius:20px;pointer-events:none;">変更</div>` : ''}
    </div>` : ''}
    <div class="detail-body">
      <div class="detail-title">${f.name}</div>
      ${f.reading?`<div class="detail-reading">（${f.reading}）</div>`:''}
      <div class="detail-maker">${f.maker||''}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">
        <span class="chip" style="margin-top:0;">${f.category||''}</span>
        <button id="detail-crown" data-id="${id}" title="基本フォント" style="background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;transition:transform 0.15s;">${f.basic ? CROWN_FILLED : CROWN_OUTLINE}</button>
      </div>

      ${weights ? `
      <div class="detail-section">
        <h3>WEIGHTS</h3>
        <div class="weight-chips">
          ${weights.map(w=>`<span class="weight-chip">${w}</span>`).join('')}
        </div>
      </div>` : ''}

      <div class="detail-section">
        <h3>MEMO</h3>
        <div id="detail-memo-display" style="font-size:16px;line-height:1.8;color:var(--c-text);min-height:32px;cursor:pointer;padding:4px 0;" onclick="document.getElementById('detail-memo-area').style.display='block';document.getElementById('detail-memo-display').style.display='none';document.getElementById('detail-memo-area').focus();">${f.memo ? f.memo.replace(/\n/g,'<br>') : '<span style="color:var(--c-text-sub);font-size:15px;">タップして入力…</span>'}</div>
        <textarea id="detail-memo-area" placeholder="このフォントについてメモ…" style="display:none;width:100%;min-height:100px;padding:12px 14px;border:1.5px solid var(--c-border);border-radius:16px;font-size:16px;color:var(--c-text);background:rgba(255,255,255,0.9);font-family:inherit;resize:vertical;outline:none;line-height:1.7;">${f.memo||''}</textarea>
        <div id="detail-memo-status" style="font-size:13px;color:var(--c-text-sub);margin-top:4px;text-align:right;height:18px;"></div>
      </div>

      ${photos.length?`
      <div class="detail-section">
        <h3>PHOTOS</h3>
        <div class="photos-grid">
          ${photos.map((p,i)=>`
            <div class="photo-thumb" data-url="${p.url}" data-memo="${p.memo||''}" data-original-url="${p.originalUrl||''}" data-idx="${i}">
              <img src="${p.url}" loading="lazy">
              ${i===0 ? '<div style="position:absolute;bottom:4px;left:4px;background:rgba(155,127,232,0.85);color:white;font-size:10px;padding:2px 6px;border-radius:6px;pointer-events:none;">カバー</div>' : ''}
            </div>
          `).join('')}
        </div>

      </div>`:''}

      <div class="divider"></div>

      <div class="detail-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <h3 style="margin-bottom:0;">フォント用例</h3>
          <button id="detail-add-usage-btn" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;color:var(--c-text-sub);">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </button>
        </div>
        ${usages.length ? `
          <div class="usage-grid">
            ${usages.map(u=>`
              <div class="usage-card" data-font-id="${id}" data-usage-id="${u.id}">
                ${u.photos&&u.photos[0]?`<img class="usage-card-img" src="${u.photos[0].url}" loading="lazy">`:`<div class="usage-card-img" style="display:flex;align-items:center;justify-content:center;"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#c0b8d8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></div>`}
                <div class="usage-card-info">
                  <div class="usage-card-date">${u.date||''}</div>
                  <div class="usage-card-place">${u.place||'場所未記入'}</div>
                </div>
              </div>
            `).join('')}
          </div>
        ` : '<div style="color:var(--c-text-sub);font-size: 15px;">用例はまだありません</div>'}
      </div>
    </div>
  `;

  // 用例追加ボタン
  const addUsageBtn = $('detail-content').querySelector('#detail-add-usage-btn');
  if (addUsageBtn) {
    addUsageBtn.addEventListener('click', () => {
      initAddUsage();
      // フォントを事前に選択した状態で用例登録へ
      selectedUsageFontId = id;
      $('usage-selected-font').textContent = `${f.name}${f.maker?' / '+f.maker:''}`;
      $('usage-step1').style.display = 'none';
      $('usage-step2').style.display = 'block';
      buildPhotoSlots('au-photos','au-photo-memos-wrap',auPhotoFiles,auPhotoMemos);
      showScreen('screen-add-usage');
    });
  }

  // カバー写真エリア — タップで拡大、長押しで変更
  const heroWrap = $('detail-content').querySelector('#detail-hero-wrap');
  if (heroWrap && photos.length > 0) {
    let heroTimer = null;
    let heroLongPressed = false;

    heroWrap.addEventListener('pointerdown', e => {
      heroLongPressed = false;
      if (photos.length <= 1) return;
      heroTimer = setTimeout(async () => {
        heroLongPressed = true;
        const items = photos.map((p, i) => ({
          action: String(i),
          icon: i === 0 ? '★' : `${i + 1}枚目`,
          label: i === 0 ? `1枚目（現在のカバー）` : `${i + 1}枚目をカバーに設定`
        }));
        const action = await showContextMenu(e.clientX, e.clientY, items);
        if (action !== null) {
          const idx = parseInt(action);
          if (idx === 0) return;
          const f2 = fonts.find(x => x.id === id);
          if (!f2?.photos) return;
          const newPhotos = [...f2.photos];
          const [selected] = newPhotos.splice(idx, 1);
          newPhotos.unshift(selected);
          try {
            await updateDoc(doc(db, 'fonts', id), { photos: newPhotos });
            f2.photos = newPhotos;
            showToast('カバー写真を変更しました');
            openDetail(id);
          } catch(e2) { showToast('エラーが発生しました'); }
        }
      }, 500);
    });
    heroWrap.addEventListener('pointerup', () => { clearTimeout(heroTimer); });
    heroWrap.addEventListener('pointercancel', () => { clearTimeout(heroTimer); heroLongPressed = false; });
    heroWrap.addEventListener('pointermove', e => { if (Math.abs(e.movementX) > 6 || Math.abs(e.movementY) > 6) clearTimeout(heroTimer); });
    heroWrap.addEventListener('click', () => {
      if (heroLongPressed) { heroLongPressed = false; return; }
      const currentSrc = $('detail-cover-img')?.src || photos[0].url;
      const photoIdx = photos.findIndex(p => p.url === currentSrc);
      openLightbox(currentSrc, '', () => {
        openPhotoEditor(currentSrc, async blob => {
          try {
            const storageRef = ref(storage, `fonts/${Date.now()}_edited.jpg`);
            await uploadBytes(storageRef, blob);
            const rawUrl = await getDownloadURL(storageRef);
            const url = rawUrl + '&t=' + Date.now();
            const f2 = fonts.find(x => x.id === id);
            if (f2?.photos) {
              const idx = photoIdx >= 0 ? photoIdx : 0;
              const orig = f2.photos[idx].originalUrl || f2.photos[idx].url;
              f2.photos[idx] = { ...f2.photos[idx], url, originalUrl: orig };
              await updateDoc(doc(db,'fonts',id), { photos: f2.photos });
              showToast('保存しました');
              openDetail(id);
            }
          } catch(e2) { showToast('保存に失敗しました'); }
        }, () => openLightbox(currentSrc, ''));
      });
    });
  }

  // ── カバー画像 位置調整（ドラッグ＋ピンチズーム）──────
  const adjustBtn = $('detail-content').querySelector('#detail-hero-adjust-btn');
  if (adjustBtn && photos.length > 0) {
    const coverImg = $('detail-cover-img');
    let isAdjustMode = false;

    // 状態: object-position(%) + scale
    let posX = 50, posY = 50, scale = 1;

    // 既存値をパース
    if (f.coverPosition) {
      const m = f.coverPosition.match(/([\d.]+)%\s+([\d.]+)%(?:\s+scale\(([\d.]+)\))?/);
      if (m) { posX = parseFloat(m[1]); posY = parseFloat(m[2]); scale = m[3] ? parseFloat(m[3]) : 1; }
    }

    function applyTransform() {
      // object-position で表示位置、transform: scale でズーム
      coverImg.style.objectPosition = `${posX.toFixed(1)}% ${posY.toFixed(1)}%`;
      coverImg.style.transform = scale !== 1 ? `scale(${scale.toFixed(2)})` : '';
    }
    applyTransform();

    const SAVE_ICON = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`;
    const MOVE_ICON = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>`;

    adjustBtn.addEventListener('click', e => {
      e.stopPropagation();
      isAdjustMode = !isAdjustMode;
      if (isAdjustMode) {
        adjustBtn.innerHTML = SAVE_ICON + ' 保存';
        adjustBtn.style.background = 'rgba(155,127,232,0.85)';
        coverImg.style.cursor = 'grab';
        heroWrap.style.touchAction = 'none';
        const hint = document.createElement('div');
        hint.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.55);color:white;font-size:13px;padding:8px 16px;border-radius:20px;pointer-events:none;white-space:nowrap;z-index:5;';
        hint.textContent = 'ドラッグ：移動　ピンチ：拡大縮小';
        heroWrap.appendChild(hint);
        setTimeout(() => hint.remove(), 2500);
      } else {
        adjustBtn.innerHTML = MOVE_ICON + ' 位置を調整';
        adjustBtn.style.background = 'rgba(0,0,0,0.5)';
        coverImg.style.cursor = 'pointer';
        heroWrap.style.touchAction = '';
        const posStr = `${posX.toFixed(1)}% ${posY.toFixed(1)}% scale(${scale.toFixed(2)})`;
        updateDoc(doc(db,'fonts',id), { coverPosition: posStr }).then(() => {
          const fLocal = fonts.find(x=>x.id===id);
          if (fLocal) fLocal.coverPosition = posStr;
          showToast('保存しました');
        }).catch(() => showToast('保存に失敗しました'));
      }
    });

    // ポインター管理
    const activePointers = new Map();
    let lastPinchDist = null;

    function getPinchDist(ptrs) {
      const vals = [...ptrs.values()];
      const dx = vals[0].x - vals[1].x;
      const dy = vals[0].y - vals[1].y;
      return Math.sqrt(dx*dx + dy*dy);
    }
    function getPinchCenter(ptrs) {
      const vals = [...ptrs.values()];
      return { x: (vals[0].x + vals[1].x) / 2, y: (vals[0].y + vals[1].y) / 2 };
    }

    let lastSinglePos = null;

    heroWrap.addEventListener('pointerdown', e => {
      if (!isAdjustMode) return;
      e.preventDefault(); e.stopPropagation();
      heroWrap.setPointerCapture(e.pointerId);
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (activePointers.size === 1) {
        lastSinglePos = { x: e.clientX, y: e.clientY };
        coverImg.style.cursor = 'grabbing';
      } else if (activePointers.size === 2) {
        lastPinchDist = getPinchDist(activePointers);
        lastSinglePos = null;
      }
    }, true);

    heroWrap.addEventListener('pointermove', e => {
      if (!isAdjustMode || !activePointers.has(e.pointerId)) return;
      e.preventDefault(); e.stopPropagation();
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (activePointers.size === 1 && lastSinglePos) {
        // 1本指：ドラッグで移動
        const dx = e.clientX - lastSinglePos.x;
        const dy = e.clientY - lastSinglePos.y;
        lastSinglePos = { x: e.clientX, y: e.clientY };
        const rect = heroWrap.getBoundingClientRect();
        posX = Math.max(0, Math.min(100, posX - dx / rect.width * 100));
        posY = Math.max(0, Math.min(100, posY - dy / rect.height * 100));
        applyTransform();
      } else if (activePointers.size === 2) {
        // 2本指：ピンチでズーム
        const newDist = getPinchDist(activePointers);
        if (lastPinchDist) {
          const ratio = newDist / lastPinchDist;
          scale = Math.max(0.5, Math.min(4, scale * ratio));
          applyTransform();
        }
        lastPinchDist = newDist;
      }
    }, true);

    heroWrap.addEventListener('pointerup', e => {
      if (!isAdjustMode) return;
      e.stopPropagation();
      activePointers.delete(e.pointerId);
      lastPinchDist = null;
      if (activePointers.size === 1) {
        const remaining = [...activePointers.values()][0];
        lastSinglePos = { x: remaining.x, y: remaining.y };
      } else if (activePointers.size === 0) {
        lastSinglePos = null;
        coverImg.style.cursor = 'grab';
      }
    }, true);

    heroWrap.addEventListener('pointercancel', e => {
      activePointers.delete(e.pointerId);
      lastPinchDist = null; lastSinglePos = null;
    }, true);
  }

  // ── コンテキストメニュー ────────────────────
  let ctxMenu = $('context-menu');
  let ctxOverlay = $('context-overlay');

  function showContextMenu(x, y, items) {
    ctxMenu.innerHTML = items.map(item =>
      `<button class="ctx-item ${item.danger?'danger':''}" data-action="${item.action}">${item.icon} ${item.label}</button>`
    ).join('');
    // 画面外にはみ出ないよう調整
    const menuW = 200, menuH = items.length * 50;
    const left = Math.min(x, window.innerWidth - menuW - 12);
    const top = Math.min(y, window.innerHeight - menuH - 12);
    ctxMenu.style.left = left + 'px';
    ctxMenu.style.top = top + 'px';
    ctxMenu.classList.add('active');
    ctxOverlay.classList.add('active');
    return new Promise(resolve => {
      ctxMenu.querySelectorAll('.ctx-item').forEach(btn => {
        btn.addEventListener('click', () => {
          hideContextMenu();
          resolve(btn.dataset.action);
        });
      });
      ctxOverlay.addEventListener('click', () => { hideContextMenu(); resolve(null); }, { once: true });
    });
  }

  function hideContextMenu() {
    ctxMenu.classList.remove('active');
    ctxOverlay.classList.remove('active');
  }

  // 写真サムネイル長押し
  $('detail-content').querySelectorAll('.photo-thumb').forEach(el => {
    let pressTimer = null;
    const idx = parseInt(el.dataset.idx ?? '0');

    el.addEventListener('pointerdown', e => {
      pressTimer = setTimeout(async () => {
        const f2 = fonts.find(x=>x.id===id);
        const hasOriginal = el.dataset.originalUrl && el.dataset.originalUrl !== '';
        const items = [
          { action: 'view', icon: '🔍', label: '拡大して見る' },
          ...(idx > 0 ? [{ action: 'cover', icon: '⭐', label: 'カバーに設定' }] : []),
          ...(hasOriginal ? [{ action: 'revert', icon: '↩️', label: '元の写真に戻す' }] : []),
        ];
        const action = await showContextMenu(e.clientX, e.clientY, items);
        if (action === 'view') openLightbox(el.dataset.url, el.dataset.memo);
        if (action === 'cover') {
          if (!f2?.photos) return;
          const newPhotos = [...f2.photos];
          const [selected] = newPhotos.splice(idx, 1);
          newPhotos.unshift(selected);
          try {
            await updateDoc(doc(db,'fonts',id), { photos: newPhotos });
            f2.photos = newPhotos;
            showToast('カバー写真を変更しました');
            openDetail(id);
          } catch(e2) { showToast('エラーが発生しました'); }
        }
        if (action === 'revert') {
          if (!f2?.photos?.[idx]?.originalUrl) return;
          const origUrl = f2.photos[idx].originalUrl;
          f2.photos[idx] = { ...f2.photos[idx], url: origUrl, originalUrl: null };
          try {
            await updateDoc(doc(db,'fonts',id), { photos: f2.photos });
            showToast('元の写真に戻しました');
            openDetail(id);
          } catch(e2) { showToast('エラーが発生しました'); }
        }
      }, 500);
    });
    el.addEventListener('pointerup', () => clearTimeout(pressTimer));
    el.addEventListener('pointercancel', () => clearTimeout(pressTimer));
    el.addEventListener('pointermove', e => { if (Math.abs(e.movementX) > 6 || Math.abs(e.movementY) > 6) clearTimeout(pressTimer); });

    // 短タップはライトボックス
    el.addEventListener('click', e => {
      if (ctxMenu.classList.contains('active')) return;
      const url = el.dataset.url;
      const memo = el.dataset.memo;
      openLightbox(url, memo, () => {
        const origUrl = el.dataset.originalUrl || '';
        openPhotoEditor(url, async (blob, revertUrl) => {
          try {
            if (revertUrl) {
              // 元に戻す
              const f2 = fonts.find(x => x.id === id);
              if (f2?.photos) {
                const pi = f2.photos.findIndex(p => p.url === url);
                if (pi >= 0) f2.photos[pi] = { ...f2.photos[pi], url: revertUrl, originalUrl: null };
                await updateDoc(doc(db,'fonts',id), { photos: f2.photos });
                showToast('元の写真に戻しました');
                openDetail(id);
              }
              return;
            }
            const storageRef = ref(storage, `fonts/${Date.now()}_edited.jpg`);
            await uploadBytes(storageRef, blob);
            const newUrl = await getDownloadURL(storageRef);
            const noCacheUrl = newUrl + '&t=' + Date.now();
            const f2 = fonts.find(x => x.id === id);
            if (f2?.photos) {
              const pi = f2.photos.findIndex(p => p.url === url);
              if (pi >= 0) {
                const orig = origUrl || f2.photos[pi].originalUrl || f2.photos[pi].url;
                f2.photos[pi] = { ...f2.photos[pi], url: noCacheUrl, originalUrl: orig };
              }
              await updateDoc(doc(db,'fonts',id), { photos: f2.photos });
              showToast('保存しました');
              openDetail(id);
            }
          } catch(e2) { showToast('保存に失敗しました'); }
        }, () => openLightbox(url, memo), origUrl);
      });
    });
  });
  $('detail-content').querySelectorAll('.usage-card').forEach(el => {
    el.addEventListener('click', () => openUsageDetail(el.dataset.fontId, el.dataset.usageId, usages));
  });

  // crownボタン
  const crownBtn = $('detail-crown');
  if (crownBtn) crownBtn.addEventListener('click', () => toggleBasic(crownBtn.dataset.id));

  // 自動保存メモ
  let memoTimer = null;
  const memoArea = $('detail-memo-area');
  const memoStatus = $('detail-memo-status');
  const memoDisplay = $('detail-memo-display');

  memoArea.addEventListener('blur', () => {
    // 表示モードに戻す
    const val = memoArea.value;
    memoDisplay.innerHTML = val ? val.replace(/\n/g,'<br>') : '<span style="color:var(--c-text-sub);font-size:15px;">タップして入力…</span>';
    memoArea.style.display = 'none';
    memoDisplay.style.display = 'block';
  });

  memoArea.addEventListener('input', () => {
    memoStatus.textContent = '入力中…';
    clearTimeout(memoTimer);
    memoTimer = setTimeout(async () => {
      const newMemo = memoArea.value;
      try {
        await updateDoc(doc(db,'fonts',id), { memo: newMemo });
        const f2 = fonts.find(x=>x.id===id);
        if (f2) f2.memo = newMemo;
        memoStatus.textContent = '保存しました ✓';
        setTimeout(() => { memoStatus.textContent = ''; }, 2000);
      } catch(e) { memoStatus.textContent = '保存に失敗しました'; }
    }, 800);
  });

  showScreen('screen-detail');
}

let efPhotoFiles = [null,null,null,null,null];
let efPhotoMemos = ['','','','',''];

function openEditFont(id) {

async function saveEditFont(id) {
  const name = $('ef-name').value.trim();
  if (!name) { showToast('フォント名を入力してください'); return; }
  $('ef-submit').disabled = true; $('ef-submit').textContent = '保存中…';
  try {
    const newPhotos = await uploadPhotos(`fonts`, efPhotoFiles, efPhotoMemos);
    const allPhotos = [...efExistingPhotos, ...newPhotos];
    const cat = document.querySelector('input[name="ef-cat"]:checked').value;
    await updateDoc(doc(db,'fonts',id), {
      name, reading: $('ef-reading').value.trim(),
      maker: $('ef-maker').value.trim(),
      category: cat, memo: $('ef-memo').value.trim(),
      photos: allPhotos
    });
    const f = fonts.find(x=>x.id===id);
    if (f) Object.assign(f, { name, reading: $('ef-reading').value.trim(), maker: $('ef-maker').value.trim(), category: cat, memo: $('ef-memo').value.trim(), photos: allPhotos });
    showToast('保存しました！');
    openDetail(id);
  } catch(e) { console.error(e); showToast('エラーが発生しました'); }
  $('ef-submit').disabled = false; $('ef-submit').textContent = '保存する';
}

async function deleteFont(id) {
  try {
    // 用例も削除
    const usnap = await getDocs(collection(db,'fonts',id,'usages'));
    for (const d of usnap.docs) await deleteDoc(doc(db,'fonts',id,'usages',d.id));
    await deleteDoc(doc(db,'fonts',id));
    fonts = fonts.filter(x=>x.id!==id);
    showToast('削除しました');
    showScreen('screen-home');
    renderHome();
  } catch(e) { console.error(e); showToast('エラーが発生しました'); }
}

// ── Edit Photo Slots（既存写真＋新規追加）──
function buildEditPhotoSlots(containerId, memoWrapId, existingArr, filesArr, memosArr) {
  const wrap = $(containerId);
  const memoWrap = $(memoWrapId);
  wrap.innerHTML = ''; memoWrap.innerHTML = '';

  // 既存写真
  existingArr.forEach((p, i) => {
    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    slot.dataset.type = 'existing';
    slot.dataset.idx = i;
    slot.innerHTML = `<img src="${p.url}">
      <button class="remove-btn" data-type="existing" data-idx="${i}">✕</button>
      <button class="edit-btn" data-type="existing" data-idx="${i}" title="編集"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>`;
    wrap.appendChild(slot);
  });

  // 新規スロット（既存＋新規が5枚以下の分）
  const remaining = 5 - existingArr.length;
  for (let i=0; i<Math.min(remaining, 5); i++) {
    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    slot.dataset.idx = i;
    slot.dataset.type = 'new';
    if (filesArr[i]) {
      const url = URL.createObjectURL(filesArr[i]);
      slot.innerHTML = `<img src="${url}">
        <button class="remove-btn" data-type="new" data-idx="${i}">✕</button>
        <button class="edit-btn" data-type="new" data-idx="${i}" title="編集"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>`;
    } else {
      slot.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    }
    wrap.appendChild(slot);
  }

  // メモ欄（既存写真）
  if (existingArr.length > 0) {
    const lbl = document.createElement('label');
    lbl.style.cssText = 'display:block;font-size: 14px;color:var(--c-text-sub);margin-bottom:8px;font-weight:500;';
    lbl.textContent = '写真へのメモ（既存）';
    memoWrap.appendChild(lbl);
    existingArr.forEach((p, i) => {
      const inp = document.createElement('input');
      inp.type = 'text'; inp.value = p.memo||'';
      inp.placeholder = `写真${i+1}へのメモ`;
      inp.style.cssText = 'width:100%;padding:10px 12px;border:1.5px solid var(--c-border);border-radius:10px;font-size: 16px;margin-bottom:8px;font-family:inherit;color:var(--c-text);background:rgba(255,255,255,0.9);outline:none;';
      inp.addEventListener('input', () => { existingArr[i] = {...existingArr[i], memo: inp.value}; });
      memoWrap.appendChild(inp);
    });
  }

  // クリックイベント
  wrap.querySelectorAll('.photo-slot').forEach(slot => {
    slot.addEventListener('click', e => {
      // ✕ 削除
      const removeBtn = e.target.closest('.remove-btn');
      if (removeBtn) {
        if (removeBtn.dataset.type === 'existing') {
          existingArr.splice(parseInt(removeBtn.dataset.idx), 1);
        } else {
          filesArr[parseInt(removeBtn.dataset.idx)] = null;
          memosArr[parseInt(removeBtn.dataset.idx)] = '';
        }
        buildEditPhotoSlots(containerId, memoWrapId, existingArr, filesArr, memosArr);
        return;
      }
      // ✏️ 編集
      const editBtn = e.target.closest('.edit-btn');
      if (editBtn) {
        const idx = parseInt(editBtn.dataset.idx);
        const type = editBtn.dataset.type;
        if (type === 'existing') {
          // 既存写真：URLからblobに変換してエディタへ
          fetch(existingArr[idx].url).then(r => r.blob()).then(blob => {
            const url = URL.createObjectURL(blob);
            openPhotoEditor(url, newBlob => {
              const file = new File([newBlob], 'edited.jpg', { type: 'image/jpeg' });
              // 既存配列から削除して新規に追加
              existingArr.splice(idx, 1);
              const emptySlot = filesArr.findIndex(f => !f);
              if (emptySlot !== -1) filesArr[emptySlot] = file;
              buildEditPhotoSlots(containerId, memoWrapId, existingArr, filesArr, memosArr);
            });
          });
        } else {
          if (!filesArr[idx]) return;
          const url = URL.createObjectURL(filesArr[idx]);
          openPhotoEditor(url, newBlob => {
            filesArr[idx] = new File([newBlob], 'edited.jpg', { type: 'image/jpeg' });
            buildEditPhotoSlots(containerId, memoWrapId, existingArr, filesArr, memosArr);
          });
        }
        return;
      }
      // 空スロットタップ → ファイル選択
      if (slot.dataset.type !== 'new') return;
      const idx = parseInt(slot.dataset.idx);
      if (filesArr[idx]) return;
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.capture = 'environment';
      input.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
      document.body.appendChild(input);
      input.addEventListener('change', e2 => {
        const file = e2.target.files[0];
        if (file) {
          filesArr[idx] = file;
          buildEditPhotoSlots(containerId, memoWrapId, existingArr, filesArr, memosArr);
        }
        document.body.removeChild(input);
      });
      input.addEventListener('cancel', () => document.body.removeChild(input));
      input.click();
    });
  });
}

// ── Photo slots (reusable) ─────────────────
function buildPhotoSlots(containerId, memoWrapId, filesArr, memosArr) {
  const wrap = $(containerId);
  const memoWrap = $(memoWrapId);
  wrap.innerHTML = '';
  memoWrap.innerHTML = '';

  for (let i=0;i<5;i++) {
    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    slot.dataset.idx = i;
    if (filesArr[i]) {
      const url = URL.createObjectURL(filesArr[i]);
      slot.innerHTML = `<img src="${url}">
        <button class="remove-btn" data-idx="${i}">✕</button>
        <button class="edit-btn" data-idx="${i}" title="編集"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>`;
    } else {
      slot.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    }
    wrap.appendChild(slot);
  }

  // memo inputs for uploaded photos
  const hasMemos = filesArr.some(f=>f);
  if (hasMemos) {
    const label = document.createElement('label');
    label.style.cssText = 'display:block;font-size: 14px;color:var(--c-text-sub);margin-bottom:8px;font-weight:500;';
    label.textContent = '写真へのメモ';
    memoWrap.appendChild(label);
    filesArr.forEach((f,i) => {
      if (!f) return;
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = `写真${i+1}へのメモ`;
      inp.value = memosArr[i]||'';
      inp.style.cssText = 'width:100%;padding:10px 12px;border:1.5px solid var(--c-border);border-radius:10px;font-size: 16px;margin-bottom:8px;font-family:inherit;color:var(--c-text);background:rgba(255,255,255,0.9);outline:none;';
      inp.addEventListener('input', () => memosArr[i] = inp.value);
      memoWrap.appendChild(inp);
    });
  }

  wrap.querySelectorAll('.photo-slot').forEach(slot => {
    slot.addEventListener('click', e => {
      // ✕ ボタン
      if (e.target.closest('.remove-btn')) {
        const idx = parseInt(e.target.closest('.remove-btn').dataset.idx);
        filesArr[idx] = null; memosArr[idx] = '';
        buildPhotoSlots(containerId, memoWrapId, filesArr, memosArr);
        return;
      }
      // ✏️ ペンボタン
      if (e.target.closest('.edit-btn')) {
        const idx = parseInt(e.target.closest('.edit-btn').dataset.idx);
        if (!filesArr[idx]) return;
        const url = URL.createObjectURL(filesArr[idx]);
        openPhotoEditor(url, blob => {
          filesArr[idx] = new File([blob], 'edited.jpg', { type: 'image/jpeg' });
          buildPhotoSlots(containerId, memoWrapId, filesArr, memosArr);
        });
        return;
      }
      // 空スロットタップ → ファイル選択
      const idx = parseInt(slot.dataset.idx);
      if (filesArr[idx]) return;
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.capture = 'environment';
      input.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
      document.body.appendChild(input);
      input.addEventListener('change', e2 => {
        const file = e2.target.files[0];
        if (file) {
          filesArr[idx] = file;
          buildPhotoSlots(containerId, memoWrapId, filesArr, memosArr);
        }
        document.body.removeChild(input);
      });
      input.addEventListener('cancel', () => document.body.removeChild(input));
      input.click();
    });
  });
}

function openUnassignedDetail(id) {
  const u = unassignedUsages.find(x=>x.id===id);
  if (!u) return;
  const photos = u.photos||[];
  $('unassigned-detail-content').innerHTML = `
    ${photos[0]?`<div class="detail-hero"><img src="${photos[0].url}" alt="用例写真"></div>`:''}
    <div class="detail-body">
      <div style="font-size:14px;color:var(--c-text-sub);">登録日：${u.date||'-'}</div>
      <div class="detail-title" style="font-size:20px;margin-top:4px;">${u.place||'場所未記入'}</div>
      ${photos.length?`
        <div class="detail-section">
          <h3>PHOTOS</h3>
          <div class="photos-grid">
            ${photos.map((p,pi)=>`
              <div class="photo-thumb" data-url="${p.url}" data-memo="${p.memo||''}" data-original-url="${p.originalUrl||''}" data-idx="${pi}">
                <img src="${p.url}" loading="lazy">
              </div>
            `).join('')}
          </div>
        </div>`:''}
    </div>
  `;
  $('unassigned-detail-content').querySelectorAll('.photo-thumb').forEach(el => {
    el.addEventListener('click', () => {
      const url = el.dataset.url;
      const memo = el.dataset.memo;
      openLightbox(url, memo, () => {
        openPhotoEditor(url, async blob => {
          try {
            const storageRef = ref(storage, `unassigned_usages/${Date.now()}_edited.jpg`);
            await uploadBytes(storageRef, blob);
            const newUrl = await getDownloadURL(storageRef);
            const uData = unassignedUsages.find(x => x.id === id);
            if (uData?.photos) {
              const pi = uData.photos.findIndex(p => p.url === url);
              if (pi >= 0) uData.photos[pi] = { ...uData.photos[pi], url: newUrl };
              await updateDoc(doc(db,'unassigned_usages',id), { photos: uData.photos });
              showToast('保存しました');
              openUnassignedDetail(id);
            }
          } catch(e2) { showToast('保存に失敗しました'); }
        }, () => openLightbox(url, memo));
      });
    });
  });

  // 削除ボタン
  $('delete-unassigned-btn').onclick = () => showConfirm(
    '用例を削除しますか？',
    'この操作は取り消せません',
    async () => {
      await deleteDoc(doc(db,'unassigned_usages',id));
      unassignedUsages = unassignedUsages.filter(x=>x.id!==id);
      renderUnassigned();
      showToast('削除しました');
      showScreen('screen-home');

  );

  // フォント割り当て検索
  $('assign-font-search').value = '';
  $('assign-font-results').innerHTML = '';

    const q = e2.target.value.toLowerCase();
    if (!q) { $('assign-font-results').innerHTML=''; return; }

    $('assign-font-results').innerHTML = results.map(f=>`
      <div class="font-card" data-id="${f.id}" style="cursor:pointer;">
