        <div class="font-info"><div class="font-name">${f.name}</div><div class="font-maker">${f.maker||''}</div></div>
        <span style="color:var(--c-text-sub);font-size:20px;">›</span>
      </div>
    `).join('');
    $('assign-font-results').querySelectorAll('.font-card').forEach(el => {
      el.addEventListener('click', () => assignUsageToFont(id, el.dataset.id, u));
    });
  };

  showScreen('screen-unassigned-detail');
}

async function assignUsageToFont(unassignedId, fontId, u) {
  try {
    // フォントの用例に移動
    await addDoc(collection(db,'fonts',fontId,'usages'), {
      date: u.date, place: u.place,
      photos: u.photos||[], createdAt: serverTimestamp()
    });
    // 未分類から削除
    await deleteDoc(doc(db,'unassigned_usages',unassignedId));
    unassignedUsages = unassignedUsages.filter(x=>x.id!==unassignedId);
    renderUnassigned();
    showToast('フォントに割り当てました！');
    openDetail(fontId);
  } catch(e) { console.error(e); showToast('エラーが発生しました'); }
}

$('unassigned-detail-back').addEventListener('click', () => showScreen('screen-home'));

// ── Upload photos（並列処理・最適化）──────
async function uploadPhotos(pathPrefix, filesArr, memosArr) {
  const tasks = [];
  for (let i = 0; i < filesArr.length; i++) {
    if (!filesArr[i]) continue;
    const file = filesArr[i];
    const memo = memosArr[i] || '';
    const idx = i;
    tasks.push(
      compressImage(file, 900, 0.75).then(async compressed => {
        const storageRef = ref(storage, `${pathPrefix}/${Date.now()}_${idx}_${file.name}`);
        await uploadBytes(storageRef, compressed);
        const url = await getDownloadURL(storageRef);
        return { idx, url, memo };
      })
    );
  }
  const results = await Promise.all(tasks);
  // インデックス順に並び替え
  return results.sort((a, b) => a.idx - b.idx).map(r => ({ url: r.url, memo: r.memo }));
}

// ── Image compress ─────────────────────────
function compressImage(file, maxSize, quality) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h*maxSize/w); w = maxSize; }
        else { w = Math.round(w*maxSize/h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob => { URL.revokeObjectURL(url); resolve(blob); }, 'image/jpeg', quality);
    };
    img.src = url;
  });
}
// ── Photo Editor ──────────────────────────
// CSSフィルター方式：crossOrigin不要でFirebase Storage URLに対応
let peOriginalSrc = '';
let peCanvas = $('photo-editor-canvas');
let peCtx = peCanvas.getContext('2d');
let peOnApply = null;
let peOnClose = null;

let peRotation = 0;
let peBrightness = 0;
let peContrast = 0;
let peSaturation = 0;
let peCropStart = null;
let peCropRect = null;

function openPhotoEditor(src, onApply, onClose, originalUrl) {
  peRotation = 0; peBrightness = 0; peContrast = 0; peSaturation = 0;
  peCropRect = null; peCropStart = null;
  peOriginalSrc = src;
  peOnApply = onApply;
  peOnClose = onClose || null;

  $('pe-brightness').value = 0; $('pe-brightness-val').textContent = '0';
  $('pe-contrast').value = 0;   $('pe-contrast-val').textContent = '0';
  $('pe-saturation').value = 0; $('pe-saturation-val').textContent = '0';

  // 元に戻すボタンの表示制御
  const revertBtn = $('pe-revert');
  if (originalUrl) {
    revertBtn.style.display = 'inline-flex';
    revertBtn.onclick = () => {
      if (peOnApply) peOnApply(null, originalUrl);
      $('photo-editor').classList.remove('active');
      if (peOnClose) peOnClose();
    };
  } else {
    revertBtn.style.display = 'none';
    revertBtn.onclick = null;
  }

  const img = $('photo-editor-img');
  img.style.transform = '';
  img.style.filter = '';
  peSetTab('adjust');
  $('photo-editor').classList.add('active');

  // 完了ボタンをロード中にdisabled
  const applyBtn = $('pe-apply');
  applyBtn.disabled = true;
  applyBtn.textContent = '読み込み中…';

  const xhr = new XMLHttpRequest();
  xhr.open('GET', src, true);
  xhr.responseType = 'blob';
  xhr.onload = () => {
    if (xhr.status === 200) {
      const blobUrl = URL.createObjectURL(xhr.response);
      img.onload = () => {
        peOriginalSrc = blobUrl;
        applyBtn.disabled = false;
        applyBtn.textContent = '完了';
      };
      img.src = blobUrl;
    } else {
      img.src = src;
      applyBtn.disabled = false;
      applyBtn.textContent = '完了';
    }
  };
  xhr.onerror = () => {
    img.src = src;
    applyBtn.disabled = false;
    applyBtn.textContent = '完了';
  };
  xhr.send();
}

function peUpdatePreview() {
  const img = $('photo-editor-img');
  // 回転はCSS transformで
  const rotMap = {0:'rotate(0deg)',90:'rotate(90deg)',180:'rotate(180deg)',270:'rotate(270deg)'};
  img.style.transform = rotMap[peRotation % 360] || '';
  // 明るさ・コントラスト・彩度はCSSフィルターで
  const b = 100 + peBrightness; // 0-200%
  const c = 100 + peContrast;   // 0-200%
  const s = 100 + peSaturation; // 0-200%
  img.style.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
}

function peSetTab(tab) {
  ['adjust','rotate','crop'].forEach(t => {
    $('pe-tab-'+t).classList.toggle('active', t === tab);
    $('pe-panel-'+t).classList.toggle('active', t === tab);
  });
  const isCrop = tab === 'crop';
  $('pe-crop-overlay').classList.toggle('active', isCrop);
  if (!isCrop) $('pe-crop-rect').style.display = 'none';
  if (isCrop) peSetupCrop();
}

['adjust','rotate','crop'].forEach(t => {
  $('pe-tab-'+t).addEventListener('click', () => peSetTab(t));
});

// スライダー
['brightness','contrast','saturation'].forEach(key => {
  $('pe-'+key).addEventListener('input', e => {
    const val = parseInt(e.target.value);
    $('pe-'+key+'-val').textContent = val;
    if (key === 'brightness') peBrightness = val;
    if (key === 'contrast') peContrast = val;
    if (key === 'saturation') peSaturation = val;
    peUpdatePreview();
  });
});

// 回転
$('pe-rotate-left').addEventListener('click', () => { peRotation = (peRotation - 90 + 360) % 360; peUpdatePreview(); });
$('pe-rotate-right').addEventListener('click', () => { peRotation = (peRotation + 90) % 360; peUpdatePreview(); });

// クロップ
function peSetupCrop() {
  $('pe-crop-rect').style.display = 'none';
  peCropStart = null;
  const overlay = $('pe-crop-overlay');
  const rectEl = $('pe-crop-rect');

  function getPos(e) {
    const img = $('photo-editor-img');
    const rect = img.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)),
      y: Math.max(0, Math.min(1, (clientY - rect.top) / rect.height)),
      rect
    };
  }

  overlay.onpointerdown = e => {
    e.preventDefault();
    const p = getPos(e);
    peCropStart = p;
    rectEl.style.cssText = `display:block;position:fixed;border:2px solid white;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);pointer-events:none;left:${p.rect.left + p.x * p.rect.width}px;top:${p.rect.top + p.y * p.rect.height}px;width:0;height:0;`;
  };
  overlay.onpointermove = e => {
    if (!peCropStart) return;
    e.preventDefault();
    const cur = getPos(e);
    const imgRect = cur.rect;
    const x1 = Math.min(peCropStart.x, cur.x);
    const y1 = Math.min(peCropStart.y, cur.y);
    const w = Math.abs(cur.x - peCropStart.x);
    const h = Math.abs(cur.y - peCropStart.y);
    rectEl.style.left = (imgRect.left + x1 * imgRect.width) + 'px';
    rectEl.style.top  = (imgRect.top  + y1 * imgRect.height) + 'px';
    rectEl.style.width  = (w * imgRect.width) + 'px';
    rectEl.style.height = (h * imgRect.height) + 'px';
    peCropRect = { x1, y1, x2: x1 + w, y2: y1 + h };
  };
  overlay.onpointerup = () => { peCropStart = null; };
}

$('pe-crop-apply').addEventListener('click', () => {
  if (!peCropRect || (peCropRect.x2 - peCropRect.x1) < 0.01) {
    showToast('範囲を選択してください');
    return;
  }
  // クロップ情報を保存してプレビュー更新
  showToast('クロップ範囲を設定しました（保存時に適用）');
  $('pe-crop-rect').style.boxShadow = '0 0 0 9999px rgba(0,120,255,0.25)';
  peSetTab('adjust');
});

// リセット
$('pe-reset').addEventListener('click', () => {
  peRotation = 0; peBrightness = 0; peContrast = 0; peSaturation = 0; peCropRect = null;
  $('pe-brightness').value = 0; $('pe-brightness-val').textContent = '0';
  $('pe-contrast').value = 0;   $('pe-contrast-val').textContent = '0';
  $('pe-saturation').value = 0; $('pe-saturation-val').textContent = '0';
  peUpdatePreview();
  peSetTab('adjust');
});

// 閉じる
$('photo-editor-close').addEventListener('click', () => {
  $('photo-editor').classList.remove('active');
  if (peOnClose) peOnClose();
});

// 完了
$('pe-apply').addEventListener('click', async () => {
  $('pe-apply').disabled = true;
  $('pe-apply').textContent = '処理中…';
  try {
    const displayImg = $('photo-editor-img');

    // imgのsrcがblobURL(XHR取得済み)かどうか確認
    // まだロード中の場合は待つ
    await new Promise((res, rej) => {
      if (displayImg.complete && displayImg.naturalWidth > 0) { res(); return; }
      displayImg.onload = res;
      displayImg.onerror = rej;
      setTimeout(rej, 8000); // 8秒タイムアウト
    });

    const rot = peRotation % 360;
    const sw = displayImg.naturalWidth;
    const sh = displayImg.naturalHeight;
    if (!sw || !sh) throw new Error('画像サイズが取得できません');

    const cw = (rot === 90 || rot === 270) ? sh : sw;
    const ch = (rot === 90 || rot === 270) ? sw : sh;
    peCanvas.width = cw; peCanvas.height = ch;
    const b = 100 + peBrightness;
    const cont = 100 + peContrast;
    const s = 100 + peSaturation;
    // まずフィルターなしで描画
    peCtx.save();
    peCtx.translate(cw/2, ch/2);
    peCtx.rotate(rot * Math.PI / 180);
    peCtx.drawImage(displayImg, -sw/2, -sh/2);
    peCtx.restore();

    // 明るさ・コントラスト・彩度をピクセル操作で適用（iOS Safari対応）
    if (peBrightness !== 0 || peContrast !== 0 || peSaturation !== 0) {
      const imgData = peCtx.getImageData(0, 0, cw, ch);
      const d = imgData.data;
      const bright = peBrightness * 2.55;
      const cont = (100 + peContrast) / 100;
      const sat = (100 + peSaturation) / 100;
      for (let i = 0; i < d.length; i += 4) {
        let r = d[i], g = d[i+1], b = d[i+2];
        r += bright; g += bright; b += bright;
        r = (r-128)*cont+128; g = (g-128)*cont+128; b = (b-128)*cont+128;
        const gray = 0.299*r + 0.587*g + 0.114*b;
        r = gray+(r-gray)*sat; g = gray+(g-gray)*sat; b = gray+(b-gray)*sat;
        d[i]   = Math.max(0,Math.min(255,Math.round(r)));
        d[i+1] = Math.max(0,Math.min(255,Math.round(g)));
        d[i+2] = Math.max(0,Math.min(255,Math.round(b)));
      }
      peCtx.putImageData(imgData, 0, 0);
    }

    // taintチェック：toDataURLを試みてSecurityErrorを事前検出
    try { peCanvas.toDataURL(); } catch(secErr) {
      throw new Error('CORS_TAINT');
    }

    let finalCanvas = peCanvas;
    if (peCropRect) {
      const cx = Math.round(peCropRect.x1 * cw);
      const cy = Math.round(peCropRect.y1 * ch);
      const cfw = Math.round((peCropRect.x2 - peCropRect.x1) * cw);
      const cfh = Math.round((peCropRect.y2 - peCropRect.y1) * ch);
      if (cfw > 10 && cfh > 10) {
        const tmp = document.createElement('canvas');
        tmp.width = cfw; tmp.height = cfh;
        tmp.getContext('2d').drawImage(peCanvas, cx, cy, cfw, cfh, 0, 0, cfw, cfh);
        finalCanvas = tmp;
      }
    }

    finalCanvas.toBlob(resultBlob => {
      if (peOnApply) peOnApply(resultBlob);
      $('photo-editor').classList.remove('active');
      if (peOnClose) peOnClose();
    }, 'image/jpeg', 0.88);

  } catch(err) {
    console.error('pe-apply error:', err);
    if (err.message === 'CORS_TAINT') {
      showToast('もう少し待ってから再度お試しください');
    } else {
      showToast('保存に失敗しました');
    }
    $('pe-apply').disabled = false;
    $('pe-apply').textContent = '完了';
  }
});
